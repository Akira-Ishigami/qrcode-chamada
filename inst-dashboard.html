<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Painel — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    /* ── Reset & Layout ── */
    #page-root { padding: 0 !important; display: flex; flex-direction: column; background: #f0f3f9; }

    .idash-body {
      padding: 24px 28px 56px; flex: 1;
      background: #f0f3f9;
    }
    @media (min-width: 769px) { .idash-body { padding: 32px 40px 64px; } }

    /* ── Hero Header ── */
    .idash-header {
      padding: 32px 40px 28px;
      background: #ffffff;
      border-bottom: 1px solid #e4eaf4;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
      position: relative; overflow: hidden;
      flex-shrink: 0;
    }
    .idash-header::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 600px 300px at 110% 50%, rgba(37,99,235,.055) 0%, transparent 70%),
        radial-gradient(ellipse 300px 200px at -10% 80%, rgba(16,163,74,.04) 0%, transparent 60%);
      pointer-events: none;
    }
    /* Decorative grid lines */
    .idash-header::after {
      content: '';
      position: absolute; top: 0; right: 0; bottom: 0; width: 40%;
      background-image:
        linear-gradient(rgba(37,99,235,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,.06) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to left, rgba(0,0,0,.5), transparent);
      pointer-events: none;
    }

    .idash-header-left { position: relative; z-index: 1; }
    .idash-greeting {
      font-family: 'Sora', system-ui, sans-serif;
      font-size: .6rem; color: #2563eb; font-weight: 700;
      text-transform: uppercase; letter-spacing: .18em; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .idash-greeting::before {
      content: ''; display: block; width: 20px; height: 2px;
      background: #2563eb; border-radius: 2px;
    }
    .idash-title {
      font-family: 'Sora', system-ui, sans-serif;
      font-size: 2rem; font-weight: 800;
      color: #0d1526; letter-spacing: -.04em; line-height: 1;
    }

    .idash-date-pill {
      background: #f0f3f9; border: 1px solid #dce3f0; border-radius: 28px;
      padding: 9px 18px; font-size: .72rem; color: #46566e; font-weight: 600;
      display: flex; align-items: center; gap: 9px; white-space: nowrap;
      position: relative; z-index: 1;
      font-family: 'Sora', system-ui, sans-serif;
    }
    .idash-date-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #16a34a; flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(22,163,74,.18);
      animation: liveGlow 2s ease-in-out infinite;
    }
    @keyframes liveGlow {
      0%,100% { box-shadow: 0 0 0 3px rgba(22,163,74,.18); }
      50%      { box-shadow: 0 0 0 5px rgba(22,163,74,.08); }
    }

    /* ── Setup checklist ── */
    .idash-setup-card {
      background: white; border: 1px solid #e4eaf4; border-radius: 18px;
      overflow: hidden; margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(37,99,235,.06);
    }
    .idash-setup-head {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 20px 14px; border-bottom: 1px solid #f0f3f9;
      background: linear-gradient(135deg, #eff6ff, #f8faff); flex-wrap: wrap;
    }
    .idash-setup-icon {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      background: #2563eb; color: white;
      display: flex; align-items: center; justify-content: center;
    }
    .idash-setup-title { font-family: 'Sora',sans-serif; font-size: .9rem; font-weight: 800; color: #0d1526; }
    .idash-setup-sub   { font-size: .72rem; color: #64748b; margin-top: 2px; }
    .idash-setup-prog-wrap {
      flex: 1; min-width: 80px; height: 6px; background: #e4eaf4;
      border-radius: 99px; overflow: hidden; margin-left: auto;
    }
    .idash-setup-prog-bar { height: 100%; background: #2563eb; border-radius: 99px; transition: width .4s; }

    .idash-setup-steps { display: flex; flex-direction: column; }
    .idash-setup-step {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 20px; border-bottom: 1px solid #f8fafd;
      text-decoration: none; transition: background .12s;
    }
    .idash-setup-step:last-child { border-bottom: none; }
    .idash-setup-step.pending:hover { background: #f8faff; }
    .idash-setup-step.done { opacity: .55; cursor: default; }

    .idash-setup-step-check {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
    }
    .idash-setup-step.done   .idash-setup-step-check { background: #dcfce7; color: #16a34a; border: 1.5px solid #86efac; }
    .idash-setup-step.pending .idash-setup-step-check { background: #eff6ff; border: 1.5px solid #bfdbfe; }

    .idash-setup-step-label { font-size: .84rem; font-weight: 700; color: #0d1526; }
    .idash-setup-step-desc  { font-size: .72rem; color: #64748b; margin-top: 2px; line-height: 1.4; }

    /* ── Stats grid ── */
    .idash-stats {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 14px; margin-bottom: 18px;
    }
    .idash-stat {
      background: white; border: 1px solid #e4eaf4;
      border-radius: 18px; padding: 22px 20px 20px;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; position: relative; overflow: hidden;
      transition: box-shadow .2s, transform .2s;
      animation: idashUp .4s cubic-bezier(.22,1,.36,1) both;
    }
    .idash-stat:hover { box-shadow: 0 8px 28px rgba(13,21,38,.1); transform: translateY(-3px); }

    /* Colored glow blob */
    .idash-stat::after {
      content: ''; position: absolute;
      width: 80px; height: 80px; border-radius: 50%;
      bottom: -20px; right: -20px;
      pointer-events: none; opacity: .55;
    }
    .idash-stat.blue::after   { background: radial-gradient(circle, #bfdbfe, transparent 70%); }
    .idash-stat.green::after  { background: radial-gradient(circle, #bbf7d0, transparent 70%); }
    .idash-stat.purple::after { background: radial-gradient(circle, #ddd6fe, transparent 70%); }
    .idash-stat.orange::after { background: radial-gradient(circle, #fed7aa, transparent 70%); }

    .idash-stat-left { display: flex; flex-direction: column; gap: 8px; }
    .idash-stat-icon {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .idash-stat-icon.blue   { background: #eff6ff; color: #2563eb; }
    .idash-stat-icon.green  { background: #f0fdf4; color: #16a34a; }
    .idash-stat-icon.purple { background: #f5f3ff; color: #7c3aed; }
    .idash-stat-icon.orange { background: #fff7ed; color: #ea580c; }

    .idash-stat-info { text-align: right; }
    .idash-stat-num {
      font-family: 'Sora', system-ui, sans-serif;
      font-size: 2.6rem; font-weight: 800; line-height: 1;
      letter-spacing: -.05em; font-variant-numeric: tabular-nums;
    }
    .idash-stat.blue   .idash-stat-num { color: #1d4ed8; }
    .idash-stat.green  .idash-stat-num { color: #15803d; }
    .idash-stat.purple .idash-stat-num { color: #6d28d9; }
    .idash-stat.orange .idash-stat-num { color: #c2410c; }

    .idash-stat-lbl {
      font-size: .64rem; color: #8fa4be; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; margin-top: 4px;
    }

    /* ── Nav pills ── */
    .idash-nav-strip {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 10px; margin-bottom: 32px;
    }
    .idash-nav-pill {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; background: white;
      border: 1px solid #e4eaf4; border-radius: 14px;
      text-decoration: none; color: #46566e;
      font-size: .82rem; font-weight: 600;
      transition: all .18s cubic-bezier(.22,1,.36,1);
      animation: idashUp .38s cubic-bezier(.22,1,.36,1) both;
    }
    .idash-nav-pill:hover {
      border-color: #93c5fd; color: #1d4ed8;
      background: linear-gradient(135deg, #eff6ff, #f0f9ff);
      box-shadow: 0 4px 16px rgba(37,99,235,.12);
      transform: translateY(-2px);
    }
    .idash-nav-pill-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: #f0f3f9; border: 1px solid #e4eaf4;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s; flex-shrink: 0;
      color: #46566e;
    }
    .idash-nav-pill:hover .idash-nav-pill-icon {
      background: #dbeafe; border-color: #93c5fd; color: #2563eb;
    }
    .idash-nav-pill span { font-family: 'Sora', system-ui, sans-serif; font-size: .78rem; }

    /* ── Section heading ── */
    .idash-section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 12px;
    }
    .idash-section-title {
      font-family: 'Sora', system-ui, sans-serif;
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .15em; color: #8fa4be;
      display: flex; align-items: center; gap: 10px;
    }
    .idash-section-title::before {
      content: ''; display: block; width: 16px; height: 2px;
      background: linear-gradient(90deg, #2563eb, #93c5fd);
      border-radius: 2px;
    }

    /* ── Chamadas list ── */
    .idash-chamadas {
      background: white; border: 1px solid #e4eaf4;
      border-radius: 18px; overflow: hidden;
    }
    .idash-chamadas-header {
      display: grid;
      grid-template-columns: 8px 1fr auto;
      gap: 0;
      padding: 10px 18px;
      background: #f8fafd;
      border-bottom: 1px solid #e4eaf4;
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #8fa4be;
      font-family: 'Sora', system-ui, sans-serif;
    }
    .idash-cham-row {
      display: grid;
      grid-template-columns: 8px 1fr auto;
      align-items: center; gap: 0;
      padding: 0;
      border-bottom: 1px solid #f0f3f9;
      transition: background .12s;
      animation: idashUp .32s cubic-bezier(.22,1,.36,1) both;
      cursor: pointer;
    }
    .idash-cham-row:last-child { border-bottom: none; }
    .idash-cham-row:hover { background: #f8fafd; }
    .idash-cham-row:hover .idash-cham-arrow { opacity: 1; transform: translateX(0); }

    /* Status stripe */
    .idash-cham-stripe {
      width: 4px; height: 100%; min-height: 52px;
      align-self: stretch; flex-shrink: 0;
    }
    .idash-cham-row.aberta-row .idash-cham-stripe { background: #16a34a; }
    .idash-cham-row:not(.aberta-row) .idash-cham-stripe { background: #e4eaf4; }

    .idash-cham-main {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px;
    }
    .idash-cham-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .idash-cham-dot.aberta  { background: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
    .idash-cham-dot.fechada { background: #c8d4e8; }

    .idash-cham-info { flex: 1; min-width: 0; }
    .idash-cham-turma {
      font-size: .875rem; font-weight: 700; color: #0d1526;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -.01em;
    }
    .idash-cham-meta { font-size: .68rem; color: #8fa4be; margin-top: 2px; font-weight: 500; }

    .idash-cham-right {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px 12px 0;
    }
    .idash-cham-badge {
      font-size: .58rem; font-weight: 700; padding: 4px 11px;
      border-radius: 20px; flex-shrink: 0; white-space: nowrap;
      font-family: 'Sora', system-ui, sans-serif; letter-spacing: .04em;
    }
    .idash-cham-badge.aberta  { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .idash-cham-badge.fechada { background: #f0f3f9; color: #8fa4be; border: 1px solid #dce3f0; }
    .idash-cham-arrow {
      color: #c8d4e8; opacity: 0; transform: translateX(-4px);
      transition: opacity .15s, transform .15s; flex-shrink: 0;
    }

    .idash-empty-box {
      background: white; border: 1px dashed #dce3f0; border-radius: 18px;
      padding: 56px 24px; text-align: center; color: #8fa4be;
      font-size: .84rem; font-weight: 500;
    }
    .idash-empty-box svg { opacity: .2; display: block; margin: 0 auto 14px; }

    /* ── Shared modal/feedback styles ── */
    .fb-section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 32px; margin-bottom: 12px; gap: 12px;
    }
    .fb-section-label {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .14em; color: #8fa4be;
      display: flex; align-items: center; gap: 8px;
    }
    .fb-section-label::before { content: ''; display: block; width: 14px; height: 2px; background: #e4eaf4; border-radius: 2px; }
    .fb-btn-new {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; background: #2563eb; color: white;
      border: none; border-radius: 9px; font-size: .78rem; font-weight: 700;
      cursor: pointer; font-family: inherit; letter-spacing: .02em;
      transition: background .13s, transform .12s, box-shadow .13s;
      box-shadow: 0 2px 8px rgba(37,99,235,.28);
    }
    .fb-btn-new:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.36); }

    .fb-list { display: flex; flex-direction: column; gap: 8px; }
    .fb-item {
      background: white; border: 1px solid #e4eaf4;
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      animation: idashUp .3s cubic-bezier(.22,1,.36,1) both;
      transition: border-color .13s, box-shadow .13s;
      border-left: 3px solid #e4eaf4;
    }
    .fb-item:hover { border-color: #bfdbfe; box-shadow: 0 2px 10px rgba(37,99,235,.07); }
    .fb-item-main { flex: 1; min-width: 0; }
    .fb-item-title { font-size: .875rem; font-weight: 600; color: #0d1526; }
    .fb-item-desc  { font-size: .76rem; color: #64748b; margin-top: 3px; line-height: 1.55; }
    .fb-item-meta  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

    .fb-chip {
      font-size: .59rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .07em; border: 1px solid;
    }
    .fb-chip.bug        { color: #b91c1c; border-color: #fca5a5; background: #fef2f2; }
    .fb-chip.melhoria   { color: #6d28d9; border-color: #c4b5fd; background: #f5f3ff; }
    .fb-chip.aberto     { color: #92400e; border-color: #fde68a; background: #fffbeb; }
    .fb-chip.em_analise { color: #5b21b6; border-color: #c4b5fd; background: #f5f3ff; }
    .fb-chip.resolvido  { color: #065f46; border-color: #6ee7b7; background: #ecfdf5; }
    .fb-date-lbl        { font-size: .65rem; color: #94a3b8; font-weight: 500; }

    /* tv-modal */
    .tv-modal-overlay { position: fixed; inset: 0; background: rgba(13,21,38,.4); display: flex; align-items: center; justify-content: center; z-index: 500; opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(4px); }
    .tv-modal-overlay.open { opacity: 1; pointer-events: all; }
    .tv-modal-card { background: white; border: 1px solid #e4eaf4; border-radius: 18px; width: 440px; max-width: calc(100vw - 32px); box-shadow: 0 20px 60px rgba(13,21,38,.14); transform: scale(.96) translateY(10px); transition: transform .24s cubic-bezier(.175,.885,.32,1.275); overflow: hidden; }
    .tv-modal-overlay.open .tv-modal-card { transform: none; }
    .tv-modal-head { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid #f0f3f9; background: #f8fafd; }
    .tv-modal-head h2 { font-size: 1rem; font-weight: 800; color: #0d1526; }
    .tv-modal-head p  { font-size: .74rem; color: #8fa4be; }
    .tv-modal-head > div:nth-child(2) { flex: 1; min-width: 0; }
    .tv-modal-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .tv-modal-icon.inst { background: #eff6ff; color: #2563eb; }
    .tv-modal-x { width: 30px; height: 30px; border-radius: 8px; background: none; border: 1px solid #e4eaf4; color: #8fa4be; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .13s; }
    .tv-modal-x:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .tv-modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; }
    .tv-label { font-size: .65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .09em; }
    .tv-input { display: block; width: 100%; border: 1px solid #e4eaf4; border-radius: 9px; padding: 10px 12px; font-size: .875rem; color: #0d1526; background: #f8fafd; font-family: inherit; outline: none; transition: border-color .13s, box-shadow .13s, background .13s; }
    .tv-input:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .tv-modal-err { font-size: .74rem; color: #dc2626; font-weight: 600; min-height: 14px; }
    .tv-modal-foot { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 14px 20px 18px; border-top: 1px solid #f0f3f9; }
    .tv-btn-ghost { background: #f0f3f9; border: 1px solid #e4eaf4; color: #46566e; font-family: inherit; font-size: .84rem; font-weight: 600; padding: 9px 16px; border-radius: 9px; cursor: pointer; transition: all .13s; }
    .tv-btn-ghost:hover { background: #e4eaf4; color: #0d1526; }
    .tv-btn-add { display: inline-flex; align-items: center; gap: 7px; background: #2563eb; color: white; border: none; border-radius: 9px; padding: 9px 18px; font-size: .84rem; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 2px 8px rgba(37,99,235,.28); transition: background .14s, transform .14s, box-shadow .14s; }
    .tv-btn-add:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.36); }
    .tv-btn-add:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    @keyframes idashUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 900px) {
      .idash-stats     { grid-template-columns: repeat(2,1fr); }
      .idash-nav-strip { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 600px) {
      .idash-stats       { grid-template-columns: 1fr 1fr; gap: 10px; }
      .idash-nav-strip   { grid-template-columns: repeat(2,1fr); gap: 8px; }
      .idash-title       { font-size: 1.55rem; }
      .idash-stat-num    { font-size: 2.1rem; }
      .idash-body        { padding: 20px 16px 48px; }
      .idash-header      { padding: 22px 20px; flex-direction: column; align-items: flex-start; gap: 10px; }
    }
    @media (max-width: 400px) {
      .idash-stats       { grid-template-columns: 1fr 1fr; gap: 8px; }
      .idash-stat        { padding: 16px 14px; }
      .idash-stat-num    { font-size: 1.8rem; }
      .idash-cham-meta   { font-size: .62rem; }
      .idash-cham-turma  { font-size: .82rem; }
    }

    /* ════ COMMAND CENTER (hero futurista) ════ */
    .idc-hero {
      position: relative; overflow: hidden;
      border-radius: 24px; padding: 26px 28px 24px; margin-bottom: 18px;
      color: #fff;
      background:
        radial-gradient(90% 130% at 100% 0%, rgba(56,189,248,.20), transparent 55%),
        radial-gradient(85% 130% at 0% 100%, rgba(124,58,237,.30), transparent 55%),
        linear-gradient(135deg, #0b1227 0%, #141f40 55%, #0c1630 100%);
      box-shadow: 0 26px 54px -26px rgba(11,18,39,.85), inset 0 1px 0 rgba(255,255,255,.07);
      animation: idashUp .42s cubic-bezier(.22,1,.36,1) both;
    }
    .idc-hero::before {
      content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .6;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 34px 34px;
      -webkit-mask-image: radial-gradient(120% 110% at 100% 0%, #000, transparent 72%);
      mask-image: radial-gradient(120% 110% at 100% 0%, #000, transparent 72%);
    }
    .idc-hero-top { position: relative; z-index: 1; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .idc-hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: 'Sora', sans-serif; font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .18em; color: #7dd3fc; }
    .idc-live-dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; animation: idcPulse 2.4s ease-in-out infinite; }
    .idc-hero-title { font-family: 'Sora', sans-serif; font-size: 1.95rem; font-weight: 800; letter-spacing: -.03em; margin-top: 9px; line-height: 1; }
    .idc-clock { text-align: right; flex-shrink: 0; }
    .idc-clock-time { font-family: 'Sora', sans-serif; font-size: 1.55rem; font-weight: 800; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .idc-clock-date { font-size: .68rem; color: rgba(255,255,255,.5); text-transform: capitalize; margin-top: 2px; }

    .idc-hero-metrics { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 24px; }
    .idc-metric { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 15px; padding: 14px 16px; backdrop-filter: blur(6px); }
    .idc-metric.live { border-color: rgba(52,211,153,.45); background: rgba(52,211,153,.1); }
    .idc-metric-top { display: flex; align-items: center; gap: 9px; }
    .idc-metric-num { font-family: 'Sora', sans-serif; font-size: 1.9rem; font-weight: 800; letter-spacing: -.03em; line-height: 1; font-variant-numeric: tabular-nums; }
    .idc-metric-num small { font-size: .9rem; opacity: .65; font-weight: 700; }
    .idc-metric-lbl { font-size: .64rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: rgba(255,255,255,.55); margin-top: 8px; }
    .idc-metric-bar { height: 5px; background: rgba(255,255,255,.13); border-radius: 99px; margin-top: 10px; overflow: hidden; }
    .idc-metric-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #34d399, #22d3ee); }
    .idc-pulse { width: 8px; height: 8px; border-radius: 50%; background: #34d399; animation: idcPulse 1.5s infinite; }
    @keyframes idcPulse { 0%,100% { box-shadow: 0 0 0 4px rgba(52,211,153,.2); } 50% { box-shadow: 0 0 0 8px rgba(52,211,153,.03); } }

    /* Tiles de recurso */
    .idc-tiles { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 14px; }
    .idc-tile { position: relative; overflow: hidden; display: block; background: #fff; border: 1px solid #e7ebf2; border-radius: 17px; padding: 16px 17px; text-decoration: none; box-shadow: 0 1px 4px rgba(15,23,42,.04); transition: transform .14s, box-shadow .14s; animation: idashUp .42s cubic-bezier(.22,1,.36,1) both; }
    .idc-tile:hover { transform: translateY(-3px); box-shadow: 0 16px 32px -16px rgba(15,23,42,.3); }
    .idc-tile::after { content: ""; position: absolute; right: -28px; top: -28px; width: 92px; height: 92px; border-radius: 50%; opacity: .55; }
    .idc-tile.blue::after   { background: radial-gradient(circle, #bfdbfe, transparent 70%); }
    .idc-tile.green::after  { background: radial-gradient(circle, #bbf7d0, transparent 70%); }
    .idc-tile.purple::after { background: radial-gradient(circle, #ddd6fe, transparent 70%); }
    .idc-tile.orange::after { background: radial-gradient(circle, #fed7aa, transparent 70%); }
    .idc-tile-icon { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
    .idc-tile.blue   .idc-tile-icon { background: #eff6ff; color: #2563eb; }
    .idc-tile.green  .idc-tile-icon { background: #f0fdf4; color: #16a34a; }
    .idc-tile.purple .idc-tile-icon { background: #f5f3ff; color: #7c3aed; }
    .idc-tile.orange .idc-tile-icon { background: #fff7ed; color: #ea580c; }
    .idc-tile-num { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: -.03em; color: #0f172a; line-height: 1; margin-top: 14px; position: relative; z-index: 1; }
    .idc-tile-lbl { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; margin-top: 6px; position: relative; z-index: 1; }
    .idc-tile-arrow { position: absolute; right: 14px; bottom: 15px; color: #cbd5e1; opacity: 0; transform: translateX(-4px); transition: .16s; }
    .idc-tile:hover .idc-tile-arrow { opacity: 1; transform: none; }

    @media (max-width: 760px) {
      .idc-hero-metrics { grid-template-columns: 1fr 1fr; }
      .idc-tiles { grid-template-columns: 1fr 1fr; }
      .idc-hero-title { font-size: 1.55rem; }
      .idc-hero-top { flex-direction: column; }

    }
    @media (max-width: 460px) {

    }

    /* ════ PAINEL CLARO (header + KPIs) ════ */
    .idl-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }

    .idl-datepill { display: inline-flex; align-items: center; gap: 8px; font-family: 'Sora', sans-serif; font-size: .73rem; font-weight: 600; color: #46566e; background: #fff; border: 1px solid #e7ebf2; padding: 9px 15px; border-radius: 99px; box-shadow: 0 1px 3px rgba(15,23,42,.05); white-space: nowrap; flex-shrink: 0; }
    .idl-pill-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }

    .idl-kpis { display: grid; grid-template-columns: repeat(4,1fr); gap: 13px; margin-bottom: 14px; }
    .idl-kpi { position: relative; overflow: hidden; background: #fff; border: 1px solid #e7ebf2; border-radius: 18px; padding: 17px 18px 18px; box-shadow: 0 6px 20px -14px rgba(15,23,42,.25); animation: idashUp .42s cubic-bezier(.22,1,.36,1) both; }

    .idl-kpi-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .idl-kpi-ico { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .idl-kpi-num { font-family: 'Sora', sans-serif; font-size: 1.95rem; font-weight: 800; letter-spacing: -.03em; color: #0b1227; line-height: 1; font-variant-numeric: tabular-nums; display: inline-flex; align-items: center; gap: 7px; }
    .idl-kpi-num small { font-size: .85rem; opacity: .6; font-weight: 700; }
    .idl-live-dot { width: 9px; height: 9px; border-radius: 50%; background: #16a34a; animation: idcPulse 1.5s infinite; }
    .idl-kpi-lbl { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #7d8aa3; margin-top: 13px; }
    .idl-kpi-sub { font-size: .72rem; color: #9aa7bd; margin-top: 4px; font-weight: 600; }

    .idl-alert { display: flex; align-items: center; gap: 13px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 15px; padding: 13px 16px; margin-bottom: 14px; text-decoration: none; animation: idashUp .4s cubic-bezier(.22,1,.36,1) both; transition: box-shadow .14s, transform .14s; }

<script>
(function(){
  var btn=document.getElementById('hamburger-btn'),sidebar=document.querySelector('.sidebar'),overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var sy=0;
  function open(){sy=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+sy+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,sy);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
