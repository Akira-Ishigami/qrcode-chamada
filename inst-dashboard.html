<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    #page-root { padding: 22px 18px !important; }
    @media (min-width: 769px) { #page-root { padding: 32px 36px !important; } }

    /* ── Header ── */
    .idash-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 28px;
    }
    .idash-greeting {
      font-size: .65rem; color: var(--acc); font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px;
    }
    .idash-title {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 1.65rem; font-weight: 700;
      color: var(--text); letter-spacing: -.03em; line-height: 1;
    }
    .idash-date-pill {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 6px 13px; font-size: .72rem; color: var(--text-3); font-weight: 500;
      display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0;
    }
    .idash-date-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

    /* ── Stats ── */
    .idash-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 22px; }
    .idash-stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 13px;
      padding: 18px 16px; display: flex; align-items: center; gap: 14px;
      transition: box-shadow .15s, transform .15s;
      animation: idashUp .32s cubic-bezier(.22,1,.36,1) both;
    }
    .idash-stat:hover { box-shadow: 0 4px 18px rgba(0,0,0,.08); transform: translateY(-1px); }
    .idash-stat-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .idash-stat-icon.blue   { background: #eff6ff; color: #2563eb; }
    .idash-stat-icon.green  { background: #f0fdf4; color: #16a34a; }
    .idash-stat-icon.purple { background: #faf5ff; color: #7c3aed; }
    .idash-stat-icon.orange { background: #fff7ed; color: #ea580c; }
    .idash-stat-info { flex: 1; min-width: 0; }
    .idash-stat-num {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 2.1rem; font-weight: 800; color: var(--text); line-height: 1; letter-spacing: -.04em;
    }
    .idash-stat-lbl { font-size: .7rem; color: var(--text-3); font-weight: 600; margin-top: 3px; line-height: 1.4; }

    /* ── Quick nav pills ── */
    .idash-nav-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 26px; }
    .idash-nav-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; text-decoration: none; color: var(--text-2);
      font-size: .78rem; font-weight: 600; transition: all .13s;
      animation: idashUp .32s cubic-bezier(.22,1,.36,1) both;
    }
    .idash-nav-pill:hover { border-color: var(--acc); color: var(--acc); background: #eff6ff; }
    .idash-nav-pill svg { flex-shrink: 0; opacity: .75; }

    /* ── Section heading ── */
    .idash-section-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .idash-section-title {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--text-3);
    }

    /* ── Chamadas list ── */
    .idash-chamadas {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 13px; overflow: hidden;
    }
    .idash-cham-row {
      display: flex; align-items: center; gap: 13px; padding: 13px 16px;
      border-bottom: 1px solid var(--border); transition: background .12s;
      animation: idashUp .32s cubic-bezier(.22,1,.36,1) both;
    }
    .idash-cham-row:last-child { border-bottom: none; }
    .idash-cham-row:hover { background: var(--surface-2); }
    .idash-cham-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .idash-cham-dot.aberta  { background: #16a34a; box-shadow: 0 0 0 3px #dcfce7; }
    .idash-cham-dot.fechada { background: #cbd5e1; }
    .idash-cham-info { flex: 1; min-width: 0; }
    .idash-cham-turma { font-size: .875rem; font-weight: 600; color: var(--text); }
    .idash-cham-meta  { font-size: .7rem; color: var(--text-3); margin-top: 1px; }
    .idash-cham-badge {
      font-size: .62rem; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; flex-shrink: 0; white-space: nowrap;
    }
    .idash-cham-badge.aberta  { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .idash-cham-badge.fechada { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border); }

    .idash-empty-box {
      background: var(--surface); border: 1px dashed var(--border-2); border-radius: 13px;
      padding: 44px 24px; text-align: center; color: var(--text-3); font-size: .84rem;
    }

    @keyframes idashUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 900px) { .idash-stats { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 600px) {
      .idash-stats  { grid-template-columns: 1fr 1fr; gap: 8px; }
      .idash-title  { font-size: 1.35rem; }
      .idash-header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .idash-stat-num { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

  <script>(function(){var r=localStorage.getItem('qr_role');if(!r)return;document.querySelectorAll('[data-role]').forEach(function(e){if(!e.dataset.role.split(' ').includes(r))e.style.display='none';});})();</script>

  <div class="main-content">
    <div id="page-root" style="flex:1;display:flex;flex-direction:column;padding:36px 40px;overflow-y:auto;min-height:0;"></div>
  </div>

<div class="toast" id="toast"></div>
<script type="module" src="/src/inst-dashboard.js"></script>
<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  localStorage.removeItem('qr_role');
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn'),sidebar=document.querySelector('.sidebar'),overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var sy=0;
  function open(){sy=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+sy+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,sy);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
