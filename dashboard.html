<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/turmas.css" />
  <style>
    /* ── Page root padding ── */
    #page-root { padding: 28px 24px !important; }
    @media (max-width: 768px) { #page-root { padding: 20px 16px !important; } }

    /* ── Header ── */
    .dash-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
    }
    .dash-title {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 1.55rem; font-weight: 700; color: var(--text);
      letter-spacing: -.025em; margin-bottom: 3px; line-height: 1.1;
    }
    .dash-subtitle { font-size: .8rem; color: var(--text-3); font-weight: 500; text-transform: capitalize; }

    /* ── Stats ── */
    .dash-stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 32px;
    }
    .dash-stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 16px;
      display: flex; flex-direction: column; gap: 12px;
      transition: border-color .15s, box-shadow .15s, transform .15s;
      animation: dashUp .35s cubic-bezier(.22,1,.36,1) both;
      position: relative; overflow: hidden;
    }
    .dash-stat-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
    }
    .dash-stat-card:has(.blue)::before   { background: #dbeafe; }
    .dash-stat-card:has(.green)::before  { background: #dcfce7; }
    .dash-stat-card:has(.purple)::before { background: #ede9fe; }
    .dash-stat-card:has(.orange)::before { background: #ffedd5; }
    .dash-stat-card:hover {
      border-color: var(--border-2);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }
    .dash-stat-icon {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .dash-stat-icon.blue   { background: #eff6ff; color: #2563eb; }
    .dash-stat-icon.green  { background: #f0fdf4; color: #16a34a; }
    .dash-stat-icon.purple { background: #faf5ff; color: #7c3aed; }
    .dash-stat-icon.orange { background: #fff7ed; color: #ea580c; }
    .dash-stat-num {
      font-size: 1.9rem; font-weight: 800; color: var(--text);
      line-height: 1; font-family: 'Outfit', system-ui, sans-serif;
      letter-spacing: -0.03em;
    }
    .dash-stat-lbl { font-size: .72rem; color: var(--text-3); font-weight: 600; line-height: 1.4; }

    /* ── Section label ── */
    .dash-section-title {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--text-3); margin-bottom: 14px;
    }
    .dash-badge-aberta {
      background: var(--amber-sub); color: var(--amber-text);
      border-radius: 5px; padding: 2px 6px; font-size: .65rem; font-weight: 700;
      display: inline-block; margin-left: 6px; vertical-align: middle;
    }

    /* ── Institution grid ── */
    .dash-inst-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

    .dash-inst-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      animation: dashUp .35s cubic-bezier(.22,1,.36,1) both;
      transition: border-color .18s, box-shadow .18s, transform .18s;
    }
    .dash-inst-card:hover {
      border-color: #bfdbfe;
      box-shadow: 0 6px 20px rgba(37,99,235,.08);
      transform: translateY(-2px);
    }
    @keyframes dashUp {
      from { opacity:0; transform:translateY(12px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .dic-header {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;
    }
    .dic-avatar {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      background: #eff6ff; color: #2563eb;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #bfdbfe;
    }
    .dic-info { flex: 1; min-width: 0; }
    .dic-name {
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 700; font-size: .92rem; color: var(--text);
      letter-spacing: -.01em; line-height: 1.25; margin-bottom: 2px;
    }
    .dic-since { font-size: .71rem; color: var(--text-3); font-weight: 400; }

    .dic-stats {
      display: flex; border: 1px solid var(--border); border-radius: 11px;
      overflow: hidden; margin-bottom: 14px; background: var(--surface-2);
    }
    .dic-stat { flex: 1; padding: 10px 8px; text-align: center; }
    .dic-stat + .dic-stat { border-left: 1px solid var(--border); }
    .dic-num {
      display: block; font-size: 1.2rem; font-weight: 800; color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif; line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .dic-lbl {
      display: block; font-size: .62rem; color: var(--text-3);
      font-weight: 600; margin-top: 2px; text-transform: uppercase; letter-spacing: .04em;
    }

    .dic-actions { display: flex; gap: 8px; align-items: center; }
    .dic-btn-reset {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-2); font-family: inherit; font-size: .78rem; font-weight: 600;
      padding: 8px 12px; border-radius: 9px; cursor: pointer;
      transition: background .13s, border-color .13s, color .13s;
    }
    .dic-btn-reset:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--acc); }

    .dic-btn-del {
      width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
      background: none; border: 1px solid var(--border); color: var(--text-3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .13s, border-color .13s, color .13s;
    }
    .dic-btn-del:hover { background: var(--red-sub); border-color: #fca5a5; color: var(--red); }

    /* ── Empty state ── */
    .dash-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 64px 24px; text-align: center; color: var(--text-3);
    }
    .dash-empty p { font-size: .875rem; line-height: 1.65; max-width: 280px; margin: 0; }

    /* ── Ver detalhes button ── */
    .dic-btn-detail {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--acc); border: none;
      color: white; font-family: inherit; font-size: .78rem; font-weight: 600;
      padding: 8px 12px; border-radius: 9px; cursor: pointer;
      transition: background .13s, transform .12s;
    }
    .dic-btn-detail:hover { background: var(--acc-2); transform: translateY(-1px); }

    /* ── Detail view ── */
    .det-breadcrumb {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px;
    }
    .det-btn-back {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-2); font-size: .8rem; font-weight: 600;
      padding: 6px 12px 6px 9px; border-radius: 20px; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .det-btn-back:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--acc); transform: translateX(-2px); }
    .det-bc-sep { color: var(--border-2); font-size: .8rem; }
    .det-bc-name { font-size: .8rem; font-weight: 600; color: var(--text-2); }

    .det-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
    }
    .det-header-left { display: flex; align-items: center; gap: 14px; }
    .det-avatar {
      width: 48px; height: 48px; border-radius: 13px; flex-shrink: 0;
      background: #eff6ff; color: #2563eb;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #bfdbfe;
    }
    .det-title {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 1.45rem; font-weight: 700; color: var(--text);
      letter-spacing: -.025em; line-height: 1.15;
    }
    .det-subtitle { font-size: .78rem; color: var(--text-3); margin-top: 2px; }
    .det-header-actions { display: flex; gap: 8px; align-items: center; }
    .det-action-btn { white-space: nowrap; }

    .det-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .det-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 13px; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .det-stat-icon {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .det-stat-num {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 1.8rem; font-weight: 800; color: var(--text);
      line-height: 1; letter-spacing: -0.03em;
    }
    .det-stat-lbl { font-size: .7rem; color: var(--text-3); font-weight: 600; }

    .det-section { margin-bottom: 28px; }
    .det-section-title {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--text-3); margin-bottom: 12px;
    }
    .det-empty {
      background: var(--surface); border: 1px dashed var(--border-2);
      border-radius: 11px; padding: 24px; text-align: center;
      color: var(--text-3); font-size: .84rem;
    }

    .det-table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .det-table { width: 100%; border-collapse: collapse; }
    .det-table th {
      background: var(--surface-2); font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text-3);
      padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .det-table td {
      padding: 12px 14px; font-size: .875rem; color: var(--text);
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    .det-table tr:last-child td { border-bottom: none; }
    .det-table tr:hover td { background: var(--surface-2); }

    .det-td-name { font-weight: 600; color: var(--text); }
    .det-td-sub  { color: var(--text-3); font-size: .82rem; }

    .det-badge {
      font-size: .62rem; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; white-space: nowrap;
    }
    .det-badge.open { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .det-badge.done { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border); }

    .det-prof-cell { display: flex; align-items: center; gap: 9px; }
    .det-prof-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: #eff6ff; color: #2563eb;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .78rem; flex-shrink: 0;
    }

    .det-chamadas { display: flex; flex-direction: column; gap: 6px; }
    .det-cham-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .det-cham-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .det-cham-dot.open  { background: #16a34a; box-shadow: 0 0 0 3px #dcfce7; }
    .det-cham-dot.done  { background: #94a3b8; }
    .det-cham-info { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
    .det-cham-nome { font-size: .875rem; font-weight: 600; color: var(--text); }
    .det-cham-data { font-size: .75rem; color: var(--text-3); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .dash-stats-row { grid-template-columns: repeat(2, 1fr); }
      .det-stats       { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 520px) {
      .dash-stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .dash-inst-grid { grid-template-columns: 1fr; }
      .det-stats       { grid-template-columns: 1fr 1fr; }
      .det-header      { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  localStorage.removeItem('qr_role');
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,scrollY);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
