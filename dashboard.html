<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/turmas.css" />
  <style>
    /* ── Header ── */
    .dash-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 32px; }
    .dash-title { font-family: 'Syne', sans-serif; font-size: 1.65rem; font-weight: 800; color: var(--text); letter-spacing: -.03em; margin-bottom: 3px; }
    .dash-subtitle { font-size: .82rem; color: var(--text-3); font-weight: 500; text-transform: capitalize; }

    /* ── Stats ── */
    .dash-stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 14px; margin-bottom: 36px; }
    .dash-stat-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 20px 18px;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color .18s, box-shadow .18s;
    }
    .dash-stat-card:hover { border-color: var(--border-2); box-shadow: var(--shadow-sm); }
    .dash-stat-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dash-stat-icon.blue   { background: #eff6ff; color: #2563eb; }
    .dash-stat-icon.green  { background: #f0fdf4; color: #16a34a; }
    .dash-stat-icon.purple { background: #faf5ff; color: #7c3aed; }
    .dash-stat-icon.orange { background: #fff7ed; color: #ea580c; }
    .dash-stat-num { font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1; font-family: 'Syne', sans-serif; }
    .dash-stat-lbl { font-size: .76rem; color: var(--text-3); font-weight: 600; line-height: 1.4; }

    /* ── Section label ── */
    .dash-section-title {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .09em; color: var(--text-3); margin-bottom: 16px;
    }
    .dash-badge-aberta {
      background: var(--amber-sub); color: var(--amber-text);
      border-radius: 6px; padding: 2px 7px; font-size: .68rem; font-weight: 700;
      display: inline-block; margin-left: 6px; vertical-align: middle;
    }

    /* ── Institution grid ── */
    .dash-inst-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }

    .dash-inst-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 18px; padding: 22px;
      animation: dashCardIn .35s cubic-bezier(.22,1,.36,1) both;
      transition: border-color .2s, box-shadow .2s, transform .2s;
    }
    .dash-inst-card:hover {
      border-color: #7dd3fc;
      box-shadow: 0 6px 24px rgba(2,132,199,.09);
      transform: translateY(-2px);
    }
    @keyframes dashCardIn { from { opacity:0; transform:translateY(12px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    .dic-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
    .dic-avatar {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      background: linear-gradient(135deg, #e0f2fe, #bae6fd); color: #0284c7;
      display: flex; align-items: center; justify-content: center;
    }
    .dic-info { flex: 1; min-width: 0; }
    .dic-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: .95rem; color: var(--text); letter-spacing: -.01em; line-height: 1.25; }
    .dic-since { font-size: .72rem; color: var(--text-3); font-weight: 500; margin-top: 2px; }

    .dic-stats {
      display: flex; border: 1.5px solid var(--border); border-radius: 12px;
      overflow: hidden; margin-bottom: 16px; background: var(--surface-2);
    }
    .dic-stat { flex: 1; padding: 11px 8px; text-align: center; }
    .dic-stat + .dic-stat { border-left: 1.5px solid var(--border); }
    .dic-num { display: block; font-size: 1.3rem; font-weight: 800; color: var(--text); font-family: 'Syne', sans-serif; line-height: 1.1; }
    .dic-lbl { display: block; font-size: .65rem; color: var(--text-3); font-weight: 600; margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }

    .dic-actions { display: flex; gap: 8px; align-items: center; }
    .dic-btn-reset {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--surface-3); border: 1.5px solid var(--border);
      color: var(--text-2); font-family: inherit; font-size: .78rem; font-weight: 600;
      padding: 8px 12px; border-radius: 10px; cursor: pointer;
      transition: background .14s, border-color .14s, color .14s;
    }
    .dic-btn-reset:hover { background: #e0f2fe; border-color: #7dd3fc; color: var(--acc); }

    .dic-btn-del {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: none; border: 1.5px solid var(--border); color: var(--text-3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .14s, border-color .14s, color .14s;
    }
    .dic-btn-del:hover { background: var(--red-sub); border-color: #fca5a5; color: var(--red); }

    /* ── Empty state ── */
    .dash-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 64px 24px; text-align: center; color: var(--text-3);
    }
    .dash-empty p { font-size: .88rem; line-height: 1.6; max-width: 280px; margin: 0; }
  </style>
</head>
<body>

<script type="module" src="/src/dashboard.js"></script>
<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,scrollY);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
</body>
</html>
