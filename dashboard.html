<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    .dash-header { margin-bottom: 28px; }
    .dash-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--text-1); letter-spacing: -.02em; }
    .dash-subtitle { font-size: .85rem; color: var(--text-3); margin-top: 4px; text-transform: capitalize; }

    .dash-stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 36px; }
    .dash-stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 18px; display: flex; flex-direction: column; gap: 10px; }
    .dash-stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .dash-stat-icon.blue   { background: #eff6ff; color: #2563eb; }
    .dash-stat-icon.green  { background: #f0fdf4; color: #16a34a; }
    .dash-stat-icon.purple { background: #faf5ff; color: #7c3aed; }
    .dash-stat-icon.orange { background: #fff7ed; color: #ea580c; }
    .dash-stat-num { font-size: 2rem; font-weight: 800; color: var(--text-1); line-height: 1; font-family: 'Syne', sans-serif; }
    .dash-stat-lbl { font-size: .78rem; color: var(--text-3); font-weight: 600; }

    .dash-section-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin-bottom: 14px; }
    .dash-badge-aberta { background: #fef3c7; color: #92400e; border-radius: 6px; padding: 2px 8px; font-size: .7rem; font-weight: 700; }

    .dash-inst-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .dash-inst-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; animation: fadeUp .3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .dic-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 8px; }
    .dic-name { font-weight: 700; font-size: .95rem; color: var(--text-1); }
    .dic-stats { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    .dic-stat { flex: 1; padding: 12px 8px; text-align: center; }
    .dic-stat:not(:last-child) { border-right: 1px solid var(--border); }
    .dic-num { display: block; font-size: 1.4rem; font-weight: 800; color: var(--text-1); font-family: 'Syne', sans-serif; line-height: 1.1; }
    .dic-lbl { display: block; font-size: .68rem; color: var(--text-3); font-weight: 600; margin-top: 2px; }
    .dic-footer { display: flex; gap: 12px; }
    .dic-link { font-size: .8rem; font-weight: 600; color: var(--accent); text-decoration: none; }
    .dic-link:hover { text-decoration: underline; }

    .dash-empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
    .dash-empty p { margin-top: 14px; font-size: .9rem; }
    .dash-btn-link { display: inline-block; margin-top: 16px; background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: .85rem; font-weight: 600; }
  </style>
</head>
<body>

<div class="mobile-topbar">
  <button class="hamburger-btn" id="hamburger-btn" aria-label="Abrir menu">
    <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
  </button>
  <div class="mobile-topbar-brand">
    <div class="mobile-topbar-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/>
        <rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/>
      </svg>
    </div>
    <span class="mobile-topbar-title">Chamada QR</span>
  </div>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

        </svg>

        <span class="sidebar-title">Chamada QR</span>

      </div>
    </div>
    <nav class="sidebar-nav">

        Dashboard

      <a href="turmas.html" class="sidebar-link" data-role="instituicao">

      <a href="cadastro.html" class="sidebar-link" data-role="instituicao">

        Chamada
      </a>
      <a href="relatorio.html" class="sidebar-link" data-role="instituicao">

      <a href="minhas-turmas.html" class="sidebar-link" data-role="professor">

      <a href="relatorio-dia.html" class="sidebar-link" data-role="professor instituicao">

    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user-name" style="padding:8px 12px;font-size:.75rem;color:var(--text-3);font-weight:500;border-top:1px solid var(--border)"></div>
      <button class="sidebar-logout-btn" id="logout-btn">
        <div class="sidebar-link-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
        Sair

    </div>
  </aside>
  <div class="main-content">
    <div id="page-root" style="flex:1;display:flex;flex-direction:column;padding:36px 40px;overflow-y:auto;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="/src/dashboard.js"></script>
<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,scrollY);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
</body>
</html>
