<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/turmas.css" />
  <style>
    /* ── Page root ── */
    #page-root { padding: 28px 24px !important; }
    @media (max-width: 768px) { #page-root { padding: 20px 16px !important; } }

    /* ══ DASHBOARD ═══════════════════════════════════════════════════════ */
    .dash-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
    }
    .dash-greeting { font-size: .7rem; color: var(--acc); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
    .dash-title { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.55rem; font-weight: 700; color: var(--text); letter-spacing: -.025em; line-height: 1.1; }
    .dash-subtitle { font-size: .8rem; color: var(--text-3); font-weight: 500; text-transform: capitalize; }

    .dash-stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
    .dash-stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px;
      display: flex; flex-direction: column; gap: 12px;
      transition: border-color .15s, box-shadow .15s, transform .15s;
      animation: dashUp .35s cubic-bezier(.22,1,.36,1) both;
    }
    .dash-stat-card:hover { border-color: var(--border-2); box-shadow: var(--shadow); transform: translateY(-2px); }
    .dash-stat-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dash-stat-icon.blue   { background: #eff6ff; color: #2563eb; }
    .dash-stat-icon.green  { background: #f0fdf4; color: #16a34a; }
    .dash-stat-icon.purple { background: #faf5ff; color: #7c3aed; }
    .dash-stat-icon.orange { background: #fff7ed; color: #ea580c; }
    .dash-stat-num { font-size: 1.9rem; font-weight: 800; color: var(--text); line-height: 1; font-family: 'Outfit', system-ui, sans-serif; letter-spacing: -0.03em; }
    .dash-stat-lbl { font-size: .72rem; color: var(--text-3); font-weight: 600; line-height: 1.4; }
    .dash-badge-aberta { background: var(--amber-sub); color: var(--amber-text); border-radius: 5px; padding: 2px 6px; font-size: .65rem; font-weight: 700; display: inline-block; margin-left: 6px; vertical-align: middle; }

    .dash-section-title { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3); margin-bottom: 12px; }

    /* Activity feed */
    .dash-activity { display: flex; flex-direction: column; gap: 6px; }
    .dash-act-row {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
      animation: dashUp .3s cubic-bezier(.22,1,.36,1) both;
    }
    .dash-act-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dash-act-dot.aberta  { background: #16a34a; box-shadow: 0 0 0 3px #dcfce7; }
    .dash-act-dot.fechada { background: #94a3b8; }
    .dash-act-info { flex: 1; min-width: 0; }
    .dash-act-turma { font-size: .875rem; font-weight: 600; color: var(--text); }
    .dash-act-inst  { font-size: .72rem; color: var(--text-3); margin-top: 1px; }
    .dash-act-badge { font-size: .62rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
    .dash-act-badge.aberta  { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .dash-act-badge.fechada { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }

    .dash-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 28px; }

    @keyframes dashUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* ══ INSTITUIÇÕES ════════════════════════════════════════════════════ */
    .inst-header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .inst-title  { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.55rem; font-weight: 700; color: var(--text); letter-spacing: -.025em; }
    .inst-subtitle { font-size: .8rem; color: var(--text-3); margin-top: 3px; }

    /* Table list */
    .inst-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .inst-table { width: 100%; border-collapse: collapse; }
    .inst-table th {
      background: var(--surface-2); font-size: .66rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-3); padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .inst-table td {
      padding: 14px 16px; font-size: .875rem; color: var(--text);
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    .inst-table tr:last-child td { border-bottom: none; }
    .inst-table tr.clickable { cursor: pointer; }
    .inst-table tr.clickable:hover td { background: var(--surface-2); }

    .inst-name-cell { display: flex; align-items: center; gap: 10px; }
    .inst-avatar {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
    }
    .inst-name-txt { font-weight: 600; }
    .inst-since    { font-size: .72rem; color: var(--text-3); margin-top: 1px; }
    .inst-mini-stat { font-weight: 700; font-size: .875rem; }
    .inst-arrow { color: var(--text-3); opacity: 0; transition: opacity .15s, transform .15s; }
    .inst-table tr.clickable:hover .inst-arrow { opacity: 1; transform: translateX(3px); }

    /* Empty */
    .inst-empty { padding: 64px 24px; text-align: center; color: var(--text-3); }
    .inst-empty p { font-size: .875rem; line-height: 1.65; max-width: 260px; margin: 8px auto 0; }

    /* ══ DETALHE INSTITUIÇÃO ═════════════════════════════════════════════ */
    .det-breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .det-btn-back {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface); border: 1px solid var(--border); color: var(--text-2);
      font-size: .8rem; font-weight: 600; padding: 6px 12px 6px 9px; border-radius: 20px;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .det-btn-back:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--acc); transform: translateX(-2px); }
    .det-bc-sep  { color: var(--border-2); }
    .det-bc-name { font-size: .8rem; font-weight: 600; color: var(--text-2); }

    .det-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .det-header-left { display: flex; align-items: center; gap: 14px; }
    .det-avatar {
      width: 48px; height: 48px; border-radius: 13px; flex-shrink: 0;
      background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
    }
    .det-title    { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.45rem; font-weight: 700; color: var(--text); letter-spacing: -.025em; }
    .det-subtitle { font-size: .78rem; color: var(--text-3); margin-top: 2px; }
    .det-header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .det-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 28px; }
    .det-stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .det-stat-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .det-stat-num  { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.65rem; font-weight: 800; color: var(--text); line-height: 1; letter-spacing: -0.03em; }
    .det-stat-lbl  { font-size: .68rem; color: var(--text-3); font-weight: 600; }

    .det-section       { margin-bottom: 28px; }
    .det-section-title { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3); margin-bottom: 12px; }
    .det-empty         { background: var(--surface); border: 1px dashed var(--border-2); border-radius: 11px; padding: 20px; text-align: center; color: var(--text-3); font-size: .84rem; }

    .det-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .det-table { width: 100%; border-collapse: collapse; }
    .det-table th {
      background: var(--surface-2); font-size: .66rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text-3);
      padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .det-table td {
      padding: 11px 14px; font-size: .86rem; color: var(--text);
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    .det-table tr:last-child td { border-bottom: none; }
    .det-table tr:hover td { background: var(--surface-2); }
    .det-td-name { font-weight: 600; }
    .det-td-sub  { color: var(--text-3); font-size: .8rem; }
    .det-badge { font-size: .62rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .det-badge.open { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .det-badge.done { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border); }
    .det-prof-cell { display: flex; align-items: center; gap: 9px; }
    .det-prof-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #eff6ff; color: #2563eb;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .75rem; flex-shrink: 0;
    }

    /* Alunos por turma */
    .det-turma-group { margin-bottom: 12px; }
    .det-turma-label {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 9px 9px 0 0; cursor: pointer; user-select: none;
      font-size: .8rem; font-weight: 700; color: var(--text);
    }
    .det-turma-label:hover { background: var(--surface-3); }
    .det-turma-label .det-turma-count { font-size: .72rem; color: var(--text-3); font-weight: 500; }
    .det-turma-label .det-turma-chevron { color: var(--text-3); transition: transform .2s; }
    .det-turma-label.open .det-turma-chevron { transform: rotate(90deg); }
    .det-turma-body {
      border: 1px solid var(--border); border-top: none; border-radius: 0 0 9px 9px;
      overflow: hidden; display: none; background: var(--surface);
    }
    .det-turma-body.open { display: block; }
    .det-aluno-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: .84rem;
    }
    .det-aluno-row:last-child { border-bottom: none; }
    .det-aluno-num { font-size: .7rem; color: var(--text-3); font-weight: 600; width: 20px; text-align: right; flex-shrink: 0; }
    .det-aluno-nome { flex: 1; font-weight: 500; }
    .det-aluno-mat  { font-size: .72rem; color: var(--text-3); }

    /* Chamadas recentes */
    .det-chamadas { display: flex; flex-direction: column; gap: 5px; }
    .det-cham-row {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; display: flex; align-items: center; gap: 12px;
    }
    .det-cham-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .det-cham-dot.open { background: #16a34a; box-shadow: 0 0 0 3px #dcfce7; }
    .det-cham-dot.done { background: #94a3b8; }
    .det-cham-info { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; flex-wrap: wrap; }
    .det-cham-nome { font-size: .84rem; font-weight: 600; color: var(--text); }
    .det-cham-data { font-size: .72rem; color: var(--text-3); }

    /* Action buttons no detalhe */
    .det-btn-reset {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-2); font-family: inherit; font-size: .78rem; font-weight: 600;
      padding: 8px 12px; border-radius: 9px; cursor: pointer;
      transition: background .13s, border-color .13s, color .13s;
    }
    .det-btn-reset:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--acc); }
    .det-btn-del {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: 1px solid var(--border); color: var(--text-3);
      font-family: inherit; font-size: .78rem; font-weight: 600;
      padding: 8px 12px; border-radius: 9px; cursor: pointer;
      transition: background .13s, border-color .13s, color .13s;
    }
    .det-btn-del:hover { background: var(--red-sub); border-color: #fca5a5; color: var(--red); }

    /* ══ ANOTAÇÕES ═══════════════════════════════════════════════════════ */
    .notes-header { margin-bottom: 20px; }
    .notes-title  { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.55rem; font-weight: 700; color: var(--text); letter-spacing: -.025em; }
    .notes-subtitle { font-size: .8rem; color: var(--text-3); margin-top: 3px; }

    .notes-wrap { display: flex; gap: 20px; align-items: flex-start; }

    .notes-main { flex: 1; min-width: 0; }
    .notes-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .notes-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface-2);
    }
    .notes-toolbar-title { font-size: .72rem; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .06em; }
    .notes-save-status { font-size: .72rem; color: var(--text-3); font-weight: 500; }
    .notes-save-status.saved { color: var(--green); }

    .notes-textarea {
      width: 100%; min-height: 420px; padding: 18px 20px;
      border: none; outline: none; resize: vertical;
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: .9rem; color: var(--text); line-height: 1.75;
      background: transparent; display: block;
      font-weight: 400;
    }
    .notes-textarea::placeholder { color: var(--text-3); }

    .notes-actions { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
    .notes-btn-save {
      padding: 8px 16px; background: var(--acc); color: white;
      border: none; border-radius: 8px; font-size: .84rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .13s, transform .12s;
    }
    .notes-btn-save:hover { background: var(--acc-2); transform: translateY(-1px); }
    .notes-btn-clear {
      padding: 8px 14px; background: none; border: 1px solid var(--border);
      color: var(--text-3); border-radius: 8px; font-size: .84rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .13s, color .13s;
    }
    .notes-btn-clear:hover { background: var(--red-sub); border-color: #fca5a5; color: var(--red); }

    /* Sidebar with pinned notes */
    .notes-sidebar { width: 240px; flex-shrink: 0; }
    .notes-pins-title { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3); margin-bottom: 10px; }
    .notes-pin-card {
      background: #fef9c3; border: 1px solid #fde68a; border-radius: 11px;
      padding: 14px; margin-bottom: 8px; position: relative; cursor: pointer;
      transition: box-shadow .15s;
    }
    .notes-pin-card:hover { box-shadow: var(--shadow); }
    .notes-pin-text { font-size: .8rem; color: #713f12; line-height: 1.55; word-break: break-word; }
    .notes-pin-date { font-size: .68rem; color: #a16207; margin-top: 6px; }
    .notes-pin-del {
      position: absolute; top: 8px; right: 8px;
      width: 20px; height: 20px; border: none; background: none;
      color: #a16207; cursor: pointer; opacity: 0; border-radius: 4px;
      transition: opacity .15s, background .13s; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; padding: 0;
    }
    .notes-pin-card:hover .notes-pin-del { opacity: 1; }
    .notes-pin-del:hover { background: rgba(0,0,0,0.1); }
    .notes-btn-pin {
      width: 100%; padding: 9px; border: 1.5px dashed var(--border-2);
      background: none; border-radius: 9px; font-size: .82rem; font-weight: 600;
      color: var(--text-3); cursor: pointer; font-family: inherit;
      transition: border-color .13s, color .13s, background .13s;
    }
    .notes-btn-pin:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-sub); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .dash-stats-row { grid-template-columns: repeat(2, 1fr); }
      .det-stats       { grid-template-columns: repeat(2, 1fr); }
      .dash-row2       { grid-template-columns: 1fr; }
      .notes-wrap      { flex-direction: column; }
      .notes-sidebar   { width: 100%; }
    }
    @media (max-width: 520px) {
      .dash-stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
      .det-stats       { grid-template-columns: 1fr 1fr; }
      .det-header      { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="mobile-topbar">
  <button class="hamburger-btn" id="hamburger-btn" aria-label="Abrir menu">
    <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
  </button>
  <div class="mobile-topbar-brand">
    <div class="mobile-topbar-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/>
        <rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/>
      </svg>
    </div>
    <span class="mobile-topbar-title">Chamada QR · Admin</span>
  </div>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/>
          <rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/>
        </svg>
      </div>
      <div class="sidebar-brand-text">
        <span class="sidebar-title">Chamada QR</span>
        <span class="sidebar-subtitle">Painel Administrativo</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="sidebar-link active" id="nav-dashboard">
        <div class="sidebar-link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        </div>
        Dashboard
      </button>
      <button class="sidebar-link" id="nav-instituicoes">
        <div class="sidebar-link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        Instituições
      </button>
      <button class="sidebar-link" id="nav-anotacoes">
        <div class="sidebar-link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        Anotações
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user-name"></div>
      <button class="sidebar-logout-btn" id="logout-btn">
        <div class="sidebar-link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </div>
        Sair
      </button>
    </div>
  </aside>

  <div class="main-content">
    <div id="page-root" style="flex:1;display:flex;flex-direction:column;overflow-y:auto;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="/src/dashboard.js"></script>
<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  localStorage.removeItem('qr_role');
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,scrollY);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
</body>
</html>
