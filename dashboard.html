<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/turmas.css" />
  <style>
    /* ── Page root ── */
    #page-root { padding: 28px 24px !important; }
    @media (max-width: 768px) { #page-root { padding: 20px 16px !important; } }
    #page-root.kanban-mode { padding: 0 !important; overflow: hidden; }

    /* ══ DASHBOARD ═══════════════════════════════════════════════════════ */

    /* Banner de boas-vindas */
    .dash-banner {
      background: linear-gradient(135deg, #080e1c 0%, #0d1526 45%, #121e38 100%);
      border-radius: 20px; padding: 32px 36px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; flex-wrap: wrap; position: relative; overflow: hidden;
      animation: dashUp .4s cubic-bezier(.22,1,.36,1) both;
      box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 8px 40px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.06);
    }
    /* Dot-grid texture */
    .dash-banner-dots {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(rgba(255,255,255,.055) 1px, transparent 1px);
      background-size: 22px 22px;
      border-radius: 20px;
    }
    /* Glow orbs */
    .dash-banner-glow1 {
      position: absolute; top: -60px; right: -60px; width: 240px; height: 240px;
      border-radius: 50%; pointer-events: none; z-index: 0;
      background: radial-gradient(circle, rgba(37,99,235,.22) 0%, transparent 65%);
    }
    .dash-banner-glow2 {
      position: absolute; bottom: -80px; left: 120px; width: 200px; height: 200px;
      border-radius: 50%; pointer-events: none; z-index: 0;
      background: radial-gradient(circle, rgba(99,102,241,.12) 0%, transparent 65%);
    }
    .dash-banner-left { position: relative; z-index: 1; }
    .dash-greeting { font-size: .62rem; color: #60a5fa; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 8px; }
    .dash-title { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.75rem; font-weight: 800; color: #fff; letter-spacing: -.03em; line-height: 1.05; }
    .dash-subtitle { font-size: .78rem; color: rgba(255,255,255,.38); margin-top: 6px; font-weight: 400; text-transform: capitalize; }
    .dash-live-pill {
      display: inline-flex; align-items: center; gap: 7px; margin-top: 12px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px; padding: 5px 12px;
      font-size: .68rem; color: #fbbf24; font-weight: 600;
    }
    .dash-live-pill.quiet { color: rgba(255,255,255,.35); }
    .dash-live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #fbbf24; flex-shrink: 0;
      box-shadow: 0 0 0 0 rgba(251,191,36,.5);
      animation: livePulse 1.8s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(251,191,36,.0); }
    }
    .dash-banner-right { position: relative; z-index: 1; text-align: right; }
    .dash-clock {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 2.8rem; font-weight: 800; color: #fff;
      letter-spacing: -.04em; line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 40px rgba(99,102,241,.35);
    }
    .dash-clock-label {
      font-size: .62rem; color: rgba(255,255,255,.3); font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em; margin-top: 5px;
    }

    /* Stats */
    .dash-stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .dash-stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px 18px; display: flex; align-items: center; gap: 16px;
      transition: border-color .18s, box-shadow .18s, transform .18s;
      animation: dashUp .35s cubic-bezier(.22,1,.36,1) both;
      position: relative; overflow: hidden;
    }
    .dash-stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .dash-stat-card:nth-child(1)::before { background: linear-gradient(90deg, #2563eb, #60a5fa); }
    .dash-stat-card:nth-child(2)::before { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .dash-stat-card:nth-child(3)::before { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
    .dash-stat-card:nth-child(4)::before { background: linear-gradient(90deg, #ea580c, #fb923c); }
    .dash-stat-card:hover { border-color: var(--border-2); box-shadow: 0 6px 24px rgba(0,0,0,.08); transform: translateY(-3px); }
    .dash-stat-icon {
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .dash-stat-icon.blue   { background: #eff6ff; color: #2563eb; }
    .dash-stat-icon.green  { background: #f0fdf4; color: #16a34a; }
    .dash-stat-icon.purple { background: #faf5ff; color: #7c3aed; }
    .dash-stat-icon.orange { background: #fff7ed; color: #ea580c; }
    .dash-stat-info { flex: 1; min-width: 0; }
    .dash-stat-num { font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1; font-family: 'Outfit', system-ui, sans-serif; letter-spacing: -0.04em; }
    .dash-stat-lbl { font-size: .68rem; color: var(--text-3); font-weight: 600; margin-top: 5px; line-height: 1.4; }
    .dash-badge-aberta { background: var(--amber-sub); color: var(--amber-text); border-radius: 5px; padding: 2px 6px; font-size: .62rem; font-weight: 700; display: inline-block; margin-left: 6px; vertical-align: middle; }

    /* Section header */
    .dash-section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .dash-section-title {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--text-3);
    }
    .dash-section-line { flex: 1; height: 1px; background: var(--border); }

    /* Activity feed */
    .dash-activity { display: flex; flex-direction: column; gap: 5px; }
    .dash-act-row {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; display: flex; align-items: center; gap: 12px;
      animation: dashUp .28s cubic-bezier(.22,1,.36,1) both;
      transition: background .11s;
    }
    .dash-act-row:hover { background: var(--surface-2); }
    .dash-act-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dash-act-dot.aberta  { background: #16a34a; box-shadow: 0 0 0 3px #dcfce7; }
    .dash-act-dot.fechada { background: #cbd5e1; }
    .dash-act-info { flex: 1; min-width: 0; }
    .dash-act-turma { font-size: .84rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dash-act-inst  { font-size: .7rem; color: var(--text-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dash-act-badge { font-size: .6rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
    .dash-act-badge.aberta  { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .dash-act-badge.fechada { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border); }

    .dash-empty-feed {
      background: var(--surface); border: 1px dashed var(--border-2); border-radius: 12px;
      padding: 28px; text-align: center; color: var(--text-3); font-size: .84rem;
    }

    @keyframes dashUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* ══ KANBAN ══════════════════════════════════════════════════════════ */
    .kanban-wrap {
      display: flex; gap: 12px; height: calc(100vh - 56px);
      padding: 20px; overflow-x: auto; align-items: flex-start;
    }
    @media (min-width: 769px) { .kanban-wrap { height: 100vh; padding: 24px; } }

    .kanban-col {
      flex: 1; min-width: 280px; max-width: 360px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 14px; display: flex; flex-direction: column;
      overflow: hidden; transition: border-color .15s;
    }
    .kanban-col.drag-over {
      border-color: var(--acc);
      background: rgba(37,99,235,.04);
      box-shadow: 0 0 0 2px rgba(37,99,235,.12);
    }

    /* Coluna header */
    .kanban-col-head {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .kanban-col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .kanban-col-dot.aberto     { background: #f59e0b; }
    .kanban-col-dot.em_analise { background: var(--acc); }
    .kanban-col-dot.resolvido  { background: var(--green); }
    .kanban-col-name { font-family: 'Outfit', system-ui, sans-serif; font-size: .82rem; font-weight: 700; color: var(--text); flex: 1; }
    .kanban-col-count {
      font-size: .62rem; font-weight: 800; padding: 2px 8px; border-radius: 20px;
      background: var(--surface-3); color: var(--text-3);
    }
    .kanban-col-count.has-items { background: var(--acc-sub); color: var(--acc); }

    /* Área de cards */
    .kanban-cards {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
      min-height: 100px;
    }

    /* Card Kanban */
    .kanban-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 11px; padding: 12px 14px;
      cursor: grab; user-select: none;
      animation: kanbanIn .25s cubic-bezier(.22,1,.36,1) both;
      transition: box-shadow .15s, border-color .15s, opacity .15s, transform .15s;
      border-left: 3px solid var(--border);
    }
    .kanban-card.tipo-bug      { border-left-color: var(--red); }
    .kanban-card.tipo-melhoria { border-left-color: var(--acc); }
    .kanban-card:hover { box-shadow: var(--shadow); border-color: var(--border-2); transform: translateY(-1px); }
    .kanban-card.dragging { opacity: .45; transform: rotate(1.5deg) scale(.98); cursor: grabbing; }
    .kanban-card.drag-ghost { border: 2px dashed var(--acc); background: rgba(37,99,235,.04); }

    @keyframes kanbanIn { from { opacity:0; transform:translateY(6px) scale(.98); } to { opacity:1; transform:none; } }

    .kanban-card-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;
    }
    .kanban-card-chevron {
      color: var(--text-3); flex-shrink: 0; transition: transform .2s; cursor: pointer;
    }
    .kanban-card.expanded { cursor: default; box-shadow: var(--shadow); border-color: var(--border-acc); }

    .kanban-card-inst {
      font-size: .62rem; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .06em;
      display: flex; align-items: center; gap: 5px; flex: 1;
    }
    .kanban-tipo-pill {
      font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      padding: 1px 6px; border-radius: 20px;
    }
    .kanban-tipo-pill.bug      { background: #fee2e2; color: var(--red); }
    .kanban-tipo-pill.melhoria { background: #eff6ff; color: var(--acc); }

    .kanban-card-title {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: .875rem; font-weight: 700; color: var(--text);
      margin-bottom: 5px; letter-spacing: -.01em; line-height: 1.3;
    }
    .kanban-card-desc {
      font-size: .76rem; color: var(--text-2); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 8px;
    }
    .kanban-card-foot { display: flex; align-items: center; justify-content: space-between; }
    .kanban-card-date { font-size: .66rem; color: var(--text-3); }
    .kanban-drag-hint { font-size: .62rem; color: var(--text-3); opacity: 0; transition: opacity .15s; }
    .kanban-card:hover .kanban-drag-hint { opacity: 1; }
    .kanban-card.expanded .kanban-drag-hint { display: none; }

    /* Expand section */
    .kanban-card-expand {
      border-top: 1px solid var(--border); margin-top: 8px; padding-top: 10px;
    }
    .kanban-expand-label {
      font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      color: var(--text-3); margin-bottom: 6px;
    }
    .kanban-expand-body {
      font-size: .82rem; color: var(--text-2); line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
      background: var(--surface-2); border-radius: 7px; padding: 10px 12px;
      margin-bottom: 10px;
    }
    .kanban-expand-meta {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .66rem; color: var(--text-3);
    }
    .kanban-expand-status {
      font-size: .62rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    }
    .kanban-expand-status.aberto     { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .kanban-expand-status.em_analise { background: #eff6ff; color: var(--acc); border: 1px solid #bfdbfe; }
    .kanban-expand-status.resolvido  { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }

    /* Empty column */
    .kanban-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 16px; text-align: center; color: var(--text-3); gap: 8px;
      border: 1.5px dashed var(--border-2); border-radius: 9px; margin: 4px;
    }
    .kanban-empty p { font-size: .78rem; line-height: 1.5; }

    /* ══ INSTITUIÇÕES — LISTA ═══════════════════════════════════════════ */
    .il-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .il-title   { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.55rem; font-weight: 700; color: var(--text); letter-spacing: -.025em; }
    .il-subtitle { font-size: .8rem; color: var(--text-3); margin-top: 3px; }
    .il-btn-new {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
      padding: 9px 16px; background: var(--acc); color: white;
      border: none; border-radius: 10px; font-size: .825rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background .15s, transform .15s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(99,102,241,.22);
    }
    .il-btn-new:hover { background: var(--acc-2); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,.32); }

    .il-list { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .il-row {
      display: flex; align-items: center; gap: 14px; padding: 13px 16px;
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background .12s;
      animation: dashUp .3s cubic-bezier(.22,1,.36,1) both;
    }
    .il-row:last-child { border-bottom: none; }
    .il-row:hover { background: var(--surface-2); }
    .il-initial {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; font-weight: 800; font-size: .95rem;
    }
    .il-row-name { flex: 1; font-weight: 600; font-size: .9rem; color: var(--text); min-width: 0; }
    .il-row-stats { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .il-stat {
      display: flex; align-items: center; gap: 3px;
      font-size: .76rem; color: var(--text-3); font-weight: 500;
      padding: 3px 9px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
    }
    .il-stat strong { color: var(--text); font-weight: 700; margin-right: 1px; }
    .il-stat.active { background: #dcfce7; border-color: #86efac; color: #14532d; }
    .il-stat.active strong { color: #14532d; }
    .il-chevron { color: var(--text-3); opacity: 0; transition: opacity .15s, transform .15s; flex-shrink: 0; margin-left: 2px; }
    .il-row:hover .il-chevron { opacity: 1; transform: translateX(2px); }
    .il-empty { padding: 64px 24px; text-align: center; color: var(--text-3); }
    .il-empty p { font-size: .875rem; max-width: 240px; margin: 8px auto 0; }

    /* ── Instituições card grid ── */
    .ig-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }
    .ig-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 22px 22px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px;
      transition: box-shadow .2s, border-color .2s, transform .2s;
      animation: dashUp .32s cubic-bezier(.22,1,.36,1) both;
      position: relative; overflow: hidden;
    }
    .ig-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: 20px 20px 0 0;
      background: linear-gradient(90deg, var(--card-fg, var(--acc)), transparent);
      opacity: .7;
    }
    .ig-card:hover {
      border-color: var(--card-fg, var(--acc));
      box-shadow: 0 10px 36px rgba(0,0,0,.1), 0 0 0 1px rgba(37,99,235,.06);
      transform: translateY(-4px);
    }
    .ig-card-avatar {
      width: 68px; height: 68px; border-radius: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; font-size: 2rem; font-weight: 800;
      transition: transform .2s;
    }
    .ig-card:hover .ig-card-avatar { transform: scale(1.06); }
    .ig-card-name {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: .9rem; font-weight: 700; color: var(--text);
      letter-spacing: -.015em; line-height: 1.3;
    }
    .ig-card-stats {
      display: flex; align-items: center; gap: 10px; margin-top: auto;
      padding-top: 12px; border-top: 1px solid var(--border); width: 100%;
      justify-content: center;
    }
    .ig-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .ig-stat-num {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 1rem; font-weight: 800; color: var(--text); line-height: 1;
    }
    .ig-stat-lbl {
      font-size: .58rem; color: var(--text-3); font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .ig-stat-div { width: 1px; height: 26px; background: var(--border); }

    /* ══ DETALHE INSTITUIÇÃO ═════════════════════════════════════════════ */
    .det-breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .det-btn-back {
      display: inline-flex; align-items: center; gap: 5px; background: none; border: none;
      color: var(--text-3); font-size: .82rem; font-weight: 600;
      padding: 0; cursor: pointer; font-family: inherit; transition: color .13s;
    }
    .det-btn-back:hover { color: var(--acc); }
    .det-bc-sep  { color: var(--border-2); font-size: .8rem; }
    .det-bc-name { font-size: .82rem; font-weight: 600; color: var(--text-2); }

    .det-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; }
    .det-header-left { display: flex; align-items: center; gap: 14px; }
    .det-avatar {
      width: 48px; height: 48px; border-radius: 13px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; font-weight: 800; font-size: 1.3rem;
    }
    .det-title { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); letter-spacing: -.025em; line-height: 1.1; }
    .det-subtitle { font-size: .78rem; color: var(--text-3); margin-top: 2px; }
    .det-header-actions { display: flex; gap: 8px; align-items: center; }

    .det-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
    .det-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .det-stat-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .det-stat-num  { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text); line-height: 1; letter-spacing: -0.03em; }
    .det-stat-lbl  { font-size: .68rem; color: var(--text-3); font-weight: 600; line-height: 1.4; }

    /* Two-column layout */
    .det-body { display: grid; grid-template-columns: 1fr 300px; gap: 18px; align-items: start; }
    .det-main-col { min-width: 0; }
    .det-side-col { min-width: 0; display: flex; flex-direction: column; gap: 18px; }

    .det-section { margin-bottom: 0; }
    .det-section-title {
      font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
      color: var(--text-3); margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .det-empty { padding: 18px; text-align: center; color: var(--text-3); font-size: .84rem; background: var(--surface); border: 1px dashed var(--border-2); border-radius: 10px; }

    .det-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .det-table { width: 100%; border-collapse: collapse; }
    .det-table th { background: var(--surface-2); font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-3); padding: 9px 13px; text-align: left; border-bottom: 1px solid var(--border); }
    .det-table td { padding: 10px 13px; font-size: .84rem; color: var(--text); border-bottom: 1px solid var(--border); vertical-align: middle; }
    .det-table tr:last-child td { border-bottom: none; }
    .det-table tr:hover td { background: var(--surface-2); }
    .det-td-name { font-weight: 600; }
    .det-td-sub  { color: var(--text-3); font-size: .78rem; }
    .det-badge { font-size: .6rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .det-badge.open { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .det-badge.done { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border); }
    .det-prof-cell { display: flex; align-items: center; gap: 9px; }
    .det-prof-avatar { width: 28px; height: 28px; border-radius: 50%; background: #eff6ff; color: #2563eb; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .72rem; flex-shrink: 0; }

    /* Accordion turmas */
    .det-turma-group { margin-bottom: 8px; }
    .det-turma-label {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer; user-select: none;
      font-size: .84rem; font-weight: 700; color: var(--text); transition: background .13s;
    }
    .det-turma-label:hover { background: var(--surface-2); }
    .det-turma-label.open { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .det-turma-label .det-turma-count { font-size: .7rem; color: var(--text-3); font-weight: 500; }
    .det-turma-label .det-turma-chevron { color: var(--text-3); transition: transform .2s; }
    .det-turma-label.open .det-turma-chevron { transform: rotate(90deg); }
    .det-turma-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; display: none; background: var(--surface); }
    .det-turma-body.open { display: block; }
    .det-aluno-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: .84rem; }
    .det-aluno-row:last-child { border-bottom: none; }
    .det-aluno-num  { font-size: .68rem; color: var(--text-3); font-weight: 600; width: 22px; text-align: right; flex-shrink: 0; }
    .det-aluno-nome { flex: 1; font-weight: 500; }
    .det-aluno-mat  { font-size: .7rem; color: var(--text-3); }
    .det-cracha-btn {
      margin-left: auto; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .65rem; font-weight: 600; color: var(--acc);
      background: var(--acc-sub); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px; cursor: pointer;
      font-family: inherit; transition: all .13s;
    }
    .det-cracha-btn:hover { background: #eff6ff; border-color: #bfdbfe; }
    .det-cracha-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Crachá preview box na lateral do ADM */
    .det-cracha-box {
      background: #f8fafc; border: 1px dashed var(--border-2);
      border-radius: 12px; overflow: hidden;
      min-height: 80px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    .det-cracha-loading {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 20px; color: var(--text-3); font-size: .78rem;
    }
    .det-cracha-img {
      width: 100%; display: block; cursor: zoom-in;
      transition: opacity .15s;
    }
    .det-cracha-img:hover { opacity: .92; }
    .det-cracha-hint {
      font-size: .65rem; color: var(--text-3); padding: 6px 12px 10px;
      text-align: center;
    }

    /* Lightbox */
    .cracha-lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      z-index: 999; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .22s; backdrop-filter: blur(6px);
      cursor: zoom-out;
    }
    .cracha-lightbox.open { opacity: 1; }
    .cracha-lightbox img {
      max-width: min(96vw, 960px); max-height: 90vh;
      border-radius: 12px; box-shadow: 0 24px 80px rgba(0,0,0,.5);
      transform: scale(.95); transition: transform .22s;
    }
    .cracha-lightbox.open img { transform: scale(1); }
    .cracha-lb-close {
      position: absolute; top: 16px; right: 20px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
      color: white; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .13s;
    }
    .cracha-lb-close:hover { background: rgba(255,255,255,.28); }

    /* Chamadas recentes */
    .det-cham-row { display: flex; align-items: center; gap: 10px; padding: 10px 13px; border-bottom: 1px solid var(--border); }
    .det-cham-row:last-child { border-bottom: none; }
    .det-cham-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .det-cham-dot.open { background: #16a34a; box-shadow: 0 0 0 3px #dcfce7; }
    .det-cham-dot.done { background: #94a3b8; }
    .det-cham-info { flex: 1; min-width: 0; }
    .det-cham-nome { font-size: .82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .det-cham-data { font-size: .7rem; color: var(--text-3); margin-top: 1px; }

    /* Action buttons */
    .det-btn-reset {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-2); font-family: inherit; font-size: .78rem; font-weight: 600;
      padding: 7px 12px; border-radius: 8px; cursor: pointer; transition: all .13s;
    }
    .det-btn-reset:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--acc); }
    .det-btn-del {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: 1px solid var(--border); color: var(--text-3);
      font-family: inherit; font-size: .78rem; font-weight: 600;
      padding: 7px 12px; border-radius: 8px; cursor: pointer; transition: all .13s;
    }
    .det-btn-del:hover { background: var(--red-sub); border-color: #fca5a5; color: var(--red); }

    /* ══ ANOTAÇÕES ═══════════════════════════════════════════════════════ */
    .notes-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
    .notes-title  { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.55rem; font-weight: 700; color: var(--text); letter-spacing: -.025em; }
    .notes-subtitle { font-size: .8rem; color: var(--text-3); margin-top: 3px; }
    .notes-btn-new {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
      padding: 9px 16px; background: var(--acc); color: white;
      border: none; border-radius: 10px; font-size: .825rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background .15s, transform .15s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(99,102,241,.22);
    }
    .notes-btn-new:hover { background: var(--acc-2); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,.32); }

    .notes-grid { columns: 3 260px; column-gap: 14px; }

    .note-card {
      break-inside: avoid; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px;
      margin-bottom: 14px; position: relative; overflow: hidden;
      transition: box-shadow .2s, transform .2s;
      animation: noteIn .28s cubic-bezier(.22,1,.36,1) both;
    }
    .note-card::before {
      content: ''; display: block; height: 4px;
      background: var(--note-color, #6366f1);
      transition: background .2s;
    }
    .note-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,.09); transform: translateY(-2px); }
    .note-card.removing { animation: noteOut .22s ease forwards; pointer-events: none; }

    @keyframes noteIn  { from { opacity: 0; transform: translateY(14px) scale(.97); } to { opacity: 1; transform: none; } }
    @keyframes noteOut { to   { opacity: 0; transform: scale(.94); max-height: 0; margin: 0; padding: 0; } }

    .note-inner { padding: 16px 16px 10px; }

    .note-title {
      width: 100%; border: none; background: transparent;
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: .94rem; font-weight: 700; color: var(--text);
      padding: 0; margin: 0 0 9px; outline: none;
      caret-color: var(--acc);
    }
    .note-title::placeholder { color: var(--text-3); font-weight: 600; }

    .note-content {
      width: 100%; border: none; background: transparent;
      font-family: inherit; font-size: .83rem; color: var(--text-2);
      line-height: 1.7; padding: 0; margin: 0;
      resize: none; outline: none; min-height: 72px; overflow: hidden;
      caret-color: var(--acc);
    }
    .note-content::placeholder { color: var(--text-3); }

    .note-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 13px; border-top: 1px solid var(--border); margin-top: 10px;
    }
    .note-colors { display: flex; gap: 5px; align-items: center; }
    .note-color-dot {
      width: 13px; height: 13px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform .15s, border-color .15s;
      flex-shrink: 0;
    }
    .note-color-dot:hover { transform: scale(1.25); }
    .note-color-dot.active { border-color: var(--text); transform: scale(1.2); }

    .note-timestamp { font-size: .67rem; color: var(--text-3); white-space: nowrap; padding-left: 8px; }

    .note-del {
      position: absolute; top: 9px; right: 9px;
      width: 26px; height: 26px; border-radius: 7px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); opacity: 0;
      transition: opacity .15s, background .15s, color .15s;
    }
    .note-card:hover .note-del { opacity: 1; }
    .note-del:hover { background: var(--red-sub); color: var(--red); }

    .notes-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 20px; text-align: center;
      grid-column: 1/-1;
    }
    .notes-empty-icon { opacity: .13; margin-bottom: 18px; color: var(--text-2); }
    .notes-empty-title { font-size: .95rem; font-weight: 700; color: var(--text-2); margin-bottom: 5px; }
    .notes-empty-sub { font-size: .8rem; color: var(--text-3); }

    /* ══ SUPORTE ═════════════════════════════════════════════════════════ */
    .ped-header { margin-bottom: 20px; }
    .ped-title  { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.55rem; font-weight: 700; color: var(--text); letter-spacing: -.025em; }
    .ped-subtitle { font-size: .8rem; color: var(--text-3); margin-top: 3px; }

    /* Tabs de status */
    .ped-tabs {
      display: flex; gap: 2px; margin-bottom: 20px;
      background: var(--surface-3); border-radius: 10px; padding: 3px;
      width: fit-content;
    }
    .ped-tab {
      padding: 7px 16px; border-radius: 8px; font-size: .78rem; font-weight: 600;
      cursor: pointer; border: none; background: transparent;
      color: var(--text-3); transition: all .15s; font-family: inherit;
      display: flex; align-items: center; gap: 6px;
    }
    .ped-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .ped-tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      border-radius: 20px; font-size: .62rem; font-weight: 800;
      background: var(--surface-4); color: var(--text-3);
    }
    .ped-tab.active .ped-tab-count { background: var(--acc-sub); color: var(--acc); }

    /* Lista */
    .ped-list { display: flex; flex-direction: column; gap: 6px; }

    /* Card — borda esquerda colorida por tipo */
    .ped-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      animation: dashUp .28s cubic-bezier(.22,1,.36,1) both;
      transition: box-shadow .15s, border-color .15s;
      border-left: 3px solid var(--border);
    }
    .ped-card:hover { border-color: var(--border-2); box-shadow: var(--shadow-sm); }
    .ped-card.tipo-reclamacao { border-left-color: var(--red); }
    .ped-card.tipo-melhoria   { border-left-color: var(--acc); }
    .ped-card.tipo-outro      { border-left-color: #7c3aed; }

    /* Cabeçalho do card */
    .ped-card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; padding: 14px 16px 0;
    }
    .ped-card-left { flex: 1; min-width: 0; }
    .ped-card-meta {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-bottom: 5px;
    }
    .ped-inst-name {
      font-size: .72rem; font-weight: 700; color: var(--text-2);
    }
    .ped-sep { color: var(--border-2); }
    .ped-tipo-pill {
      font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
      padding: 2px 7px; border-radius: 20px;
    }
    .ped-tipo-pill.reclamacao { background: #fee2e2; color: var(--red); }
    .ped-tipo-pill.melhoria   { background: #eff6ff; color: var(--acc); }
    .ped-tipo-pill.outro      { background: #f5f3ff; color: #7c3aed; }
    .ped-data { font-size: .68rem; color: var(--text-3); }

    .ped-card-titulo {
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 700; font-size: .93rem; color: var(--text);
      letter-spacing: -.01em;
    }

    /* Status badge clicável (dropdown trigger) */
    .ped-status-wrap { position: relative; flex-shrink: 0; }

    .ped-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .6rem; font-weight: 700; padding: 5px 10px;
      border-radius: 20px; white-space: nowrap; cursor: pointer;
      user-select: none; transition: opacity .13s, transform .1s;
    }
    .ped-status:hover { opacity: .85; transform: translateY(-1px); }
    .ped-status:active { transform: scale(.97); }
    .ped-status svg { transition: transform .2s; }
    .ped-status.open svg { transform: rotate(180deg); }
    .ped-status.pendente   { background: var(--amber-sub); color: var(--amber-text); border: 1px solid #fde68a; }
    .ped-status.em_analise { background: #eff6ff; color: var(--acc); border: 1px solid #bfdbfe; }
    .ped-status.resolvido  { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }

    /* Dropdown do status */
    .ped-status-dropdown {
      position: absolute; top: calc(100% + 6px); right: 0; z-index: 200;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 8px 32px rgba(13,21,38,.14), 0 2px 8px rgba(13,21,38,.08);
      min-width: 210px; overflow: hidden;
      opacity: 0; transform: translateY(-6px) scale(.97);
      pointer-events: none;
      transition: opacity .18s cubic-bezier(.22,1,.36,1), transform .18s cubic-bezier(.22,1,.36,1);
    }
    .ped-status-dropdown.open {
      opacity: 1; transform: none; pointer-events: all;
    }
    .ped-dd-label {
      font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      color: var(--text-3); padding: 10px 14px 6px;
    }
    .ped-dd-opt {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer; transition: background .11s;
      border: none; background: none; width: 100%; text-align: left;
      font-family: inherit;
    }
    .ped-dd-opt:hover { background: var(--surface-2); }
    .ped-dd-opt:last-child { border-radius: 0 0 12px 12px; }
    .ped-dd-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .ped-dd-opt[data-status="pendente"]   .ped-dd-dot { background: var(--amber); }
    .ped-dd-opt[data-status="em_analise"] .ped-dd-dot { background: var(--acc); }
    .ped-dd-opt[data-status="resolvido"]  .ped-dd-dot { background: var(--green); }
    .ped-dd-info { display: flex; flex-direction: column; gap: 1px; }
    .ped-dd-name { font-size: .82rem; font-weight: 600; color: var(--text); }
    .ped-dd-desc { font-size: .68rem; color: var(--text-3); }
    .ped-dd-check { margin-left: auto; color: var(--green); flex-shrink: 0; }

    /* Descrição */
    .ped-card-desc {
      margin: 10px 16px;
      font-size: .84rem; color: var(--text-2); line-height: 1.6;
      padding: 10px 12px;
      background: var(--surface-2); border-radius: 8px;
    }

    /* Empty */
    .ped-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 64px 24px; text-align: center; color: var(--text-3);
      background: var(--surface); border: 1px dashed var(--border-2);
      border-radius: 13px; gap: 10px;
    }
    .ped-empty p { font-size: .875rem; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .dash-stats-row { grid-template-columns: repeat(2, 1fr); }
      .det-stats       { grid-template-columns: repeat(2, 1fr); }
      .det-body        { grid-template-columns: 1fr; }
      .dash-row2       { grid-template-columns: 1fr; }
      .notes-grid      { columns: 2 220px; }
      .ig-grid         { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .dash-banner     { padding: 24px 24px; }
      .dash-title      { font-size: 1.4rem; }
      .dash-clock      { font-size: 2rem; }
    }
    @media (max-width: 520px) {
      .dash-stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
      .det-stats  { grid-template-columns: 1fr 1fr; }
      .det-header { flex-direction: column; align-items: flex-start; }
      .det-body   { grid-template-columns: 1fr; }
      .ig-grid    { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .ig-card    { padding: 22px 16px 18px; }
      .ig-card-avatar { width: 54px; height: 54px; font-size: 1.5rem; }
      .dash-clock { font-size: 1.6rem; }
    }
  </style>
</head>

          <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>

      </button>

        <div class="sidebar-link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

        <div class="sidebar-link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  localStorage.removeItem('qr_role');
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
    document.body.classList.remove('sidebar-open');
    document.body.style.top='';
    /* Só restaura scroll ao fechar pelo overlay/esc, não ao trocar de aba */
    if(arguments[0]!=='nav')window.scrollTo(0,scrollY);
  }
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',function(){close();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  /* Botões de nav: fecha sidebar sem restaurar scroll, depois o JS troca a view */
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){
    l.addEventListener('click',function(){close('nav');});
  });
})();
</script>
