<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Codes de Teste</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      padding: 24px;
    }
    h1 {
      text-align: center;
      color: #2b6cb0;
      margin-bottom: 8px;
      font-size: 1.3rem;
    }
    p.sub {
      text-align: center;
      color: #718096;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .qr-box {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .qr-box img,
    .qr-box canvas {
      width: 140px;
      height: 140px;
    }
    .id   { font-size: 0.75rem; color: #a0aec0; margin-top: 10px; }
    .nome { font-size: 0.85rem; font-weight: 600; color: #2d3748; margin-top: 4px; }
    .erro { color: #e53e3e; font-size: 0.8rem; margin-top: 8px; }
    a.voltar {
      display: block;
      text-align: center;
      margin-top: 32px;
      color: #2b6cb0;
      text-decoration: none;
      font-size: 0.9rem;
    }
    a.voltar:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <h1>QR Codes de Teste</h1>
  <p class="sub">Aponte a câmera do sistema para qualquer um destes QR codes</p>

  <div class="grid" id="grid"></div>

  <a class="voltar" href="index.html">← Voltar para a chamada</a>

  <script type="module" src="/src/qr-teste.js"></script>
</body>
</html>
