  <style>
    .rd-header { margin-bottom: 28px; }
    .rd-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--text-1); letter-spacing: -.02em; }
    .rd-subtitle { font-size: .85rem; color: var(--text-3); margin-top: 4px; text-transform: capitalize; }

    .rd-stats { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
    .rd-stat { display: flex; flex-direction: column; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 24px; min-width: 90px; }
    .rd-num { font-size: 1.8rem; font-weight: 800; font-family: 'Syne', sans-serif; line-height: 1; }
    .rd-lbl { font-size: .72rem; font-weight: 600; color: var(--text-3); margin-top: 4px; }
    .rd-stat.green .rd-num { color: #16a34a; }
    .rd-stat.red   .rd-num { color: #dc2626; }
    .rd-stat.blue  .rd-num { color: #2563eb; }

    .rd-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
    .rd-card-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; user-select: none; }
    .rd-card-header:hover { background: var(--hover, #f8fafc); }
    .rd-card-info { flex: 1; min-width: 0; }
    .rd-card-nome { font-weight: 700; font-size: .92rem; color: var(--text-1); }
    .rd-card-meta { font-size: .75rem; color: var(--text-3); margin-top: 2px; }
    .rd-card-badges { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .rd-pct { font-size: .75rem; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
    .rd-pct.green  { background: #dcfce7; color: #166534; }
    .rd-pct.orange { background: #ffedd5; color: #9a3412; }
    .rd-pct.red    { background: #fee2e2; color: #991b1b; }
    .rd-chevron { color: var(--text-3); flex-shrink: 0; transition: transform .2s; }
    .rd-card.open .rd-chevron { transform: rotate(90deg); }
    .rd-alunos { display: none; border-top: 1px solid var(--border); padding: 8px 0; }
    .rd-card.open .rd-alunos { display: block; }
    .rd-aluno-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; font-size: .83rem; }
    .rd-aluno-nome { color: var(--text-1); }

    .rd-section-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin: 24px 0 10px; }
    .rd-sem-chamada { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .rd-turma-row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border); }
    .rd-turma-row:last-child { border-bottom: none; }
    .rd-turma-nome { font-weight: 600; font-size: .85rem; color: var(--text-1); }
    .rd-turma-meta { font-size: .75rem; color: var(--text-3); }
    .rd-turma-inst { font-size: .72rem; color: var(--text-3); background: var(--surface-2, #f1f5f9); padding: 2px 8px; border-radius: 6px; margin-left: auto; }

    .rd-empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
    .rd-empty p { margin-top: 14px; font-size: .9rem; }

    .dot-presente { color: #16a34a; font-weight: 600; font-size: .78rem; }
    .dot-ausente  { color: #dc2626; font-weight: 600; font-size: .78rem; }
    .badge-aberta    { background: #dcfce7; color: #166534; border-radius: 6px; padding: 2px 8px; font-size: .7rem; font-weight: 700; }
    .badge-encerrada { background: #f1f5f9; color: #64748b; border-radius: 6px; padding: 2px 8px; font-size: .7rem; font-weight: 700; }
    .badge-presente  { background: #dcfce7; color: #166534; border-radius: 6px; padding: 2px 8px; font-size: .72rem; font-weight: 700; }
    .badge-ausente   { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 2px 8px; font-size: .72rem; font-weight: 700; }
  </style>
</head>

<script>
(function(){var r=localStorage.getItem('qr_role');if(!r)return;document.querySelectorAll('[data-role]').forEach(function(e){if(!e.dataset.role.split(' ').includes(r))e.style.display='none';});})();
</script>

<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  localStorage.removeItem('qr_role');
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,scrollY);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
