<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/relatorio.css" />
  <style>
    #page-root { padding: 22px 18px !important; }
    @media (min-width: 769px) { #page-root { padding: 32px 36px !important; } }

    /* ── Header ── */
    .rd-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
    .rd-eyebrow { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--acc); margin-bottom: 5px; }
    .rd-title { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.65rem; font-weight: 800; color: var(--text); letter-spacing: -.03em; line-height: 1.1; }
    .rd-subtitle { font-size: .82rem; color: var(--text-3); margin-top: 4px; text-transform: capitalize; }
    .rd-date-pill {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 7px 14px; font-size: .73rem; color: var(--text-2); font-weight: 600;
      display: flex; align-items: center; gap: 7px; white-space: nowrap; flex-shrink: 0;
    }
    .rd-date-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 0 2px #dcfce7; }

    /* ── Stats ── */
    .rd-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .rd-stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px 16px; display: flex; align-items: center; gap: 14px;
      animation: rdUp .3s cubic-bezier(.22,1,.36,1) both;
      transition: box-shadow .15s, transform .15s;
    }
    .rd-stat:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .rd-stat-icon { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .rd-stat.green .rd-stat-icon { background: #dcfce7; color: #16a34a; }
    .rd-stat.red   .rd-stat-icon { background: #fee2e2; color: #dc2626; }
    .rd-stat.blue  .rd-stat-icon { background: #eff6ff; color: #2563eb; }
    .rd-stat-info {}
    .rd-num { font-family: 'Outfit', system-ui, sans-serif; font-size: 2rem; font-weight: 800; line-height: 1; letter-spacing: -.04em; }
    .rd-lbl { font-size: .67rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; margin-top: 3px; }
    .rd-stat.green .rd-num { color: #16a34a; }
    .rd-stat.red   .rd-num { color: #dc2626; }
    .rd-stat.blue  .rd-num { color: #2563eb; }

    /* ── Cards de chamada ── */
    .rd-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; margin-bottom: 10px; overflow: hidden;
      animation: rdUp .28s cubic-bezier(.22,1,.36,1) both;
      transition: border-color .15s, box-shadow .15s;
    }
    .rd-card:hover { border-color: var(--border-2); }
    .rd-card.open  { border-color: var(--border-acc); box-shadow: 0 0 0 3px var(--acc-sub); }

    .rd-card-header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; cursor: pointer; user-select: none;
      transition: background .12s;
    }
    .rd-card-header:hover { background: var(--surface-2); }

    .rd-card-avatar {
      width: 44px; height: 44px; border-radius: 11px; flex-shrink: 0;
      background: #eff6ff; color: var(--acc);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; font-weight: 800; font-size: 1.15rem;
    }
    .rd-card-info { flex: 1; min-width: 0; }
    .rd-card-nome { font-weight: 700; font-size: .95rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rd-card-meta { font-size: .73rem; color: var(--text-3); margin-top: 2px; }
    .rd-card-badges { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .rd-chevron { color: var(--text-3); flex-shrink: 0; transition: transform .22s; }
    .rd-card.open .rd-chevron { transform: rotate(90deg); }

    /* ── Barra de frequência ── */
    .rd-progress {
      padding: 0 18px 14px;
    }
    .rd-progress-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .rd-progress-label { font-size: .68rem; font-weight: 600; color: var(--text-3); }
    .rd-progress-pct   { font-family: 'Outfit', system-ui, sans-serif; font-size: .75rem; font-weight: 800; }
    .rd-progress-pct.green  { color: #16a34a; }
    .rd-progress-pct.orange { color: #ea580c; }
    .rd-progress-pct.red    { color: #dc2626; }
    .rd-bar-bg { height: 5px; background: var(--surface-3); border-radius: 99px; overflow: hidden; }
    .rd-bar-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.22,1,.36,1); }
    .rd-bar-fill.green  { background: linear-gradient(90deg,#16a34a,#4ade80); }
    .rd-bar-fill.orange { background: linear-gradient(90deg,#ea580c,#fb923c); }
    .rd-bar-fill.red    { background: linear-gradient(90deg,#dc2626,#f87171); }

    /* ── % frequência badge ── */
    .rd-pct { font-size: .72rem; font-weight: 800; padding: 3px 9px; border-radius: 7px; font-family: 'Outfit', system-ui, sans-serif; }
    .rd-pct.green  { background: #dcfce7; color: #14532d; }
    .rd-pct.orange { background: #ffedd5; color: #9a3412; }
    .rd-pct.red    { background: #fee2e2; color: #991b1b; }

    /* ── Lista de alunos accordion ── */
    .rd-alunos { display: none; border-top: 1px solid var(--border); }
    .rd-card.open .rd-alunos { display: block; }
    .rd-alunos-head {
      display: grid; grid-template-columns: 1fr auto;
      padding: 8px 18px; background: var(--surface-2);
      font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3);
      border-bottom: 1px solid var(--border);
    }
    .rd-aluno-row {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 18px; border-bottom: 1px solid var(--border); font-size: .84rem;
    }
    .rd-aluno-row:last-child { border-bottom: none; }
    .rd-aluno-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .rd-aluno-dot.p { background: #16a34a; box-shadow: 0 0 0 2px #dcfce7; }
    .rd-aluno-dot.a { background: #dc2626; box-shadow: 0 0 0 2px #fee2e2; }
    .rd-aluno-nome { flex: 1; font-weight: 500; color: var(--text); }
    .rd-aluno-status { font-size: .68rem; font-weight: 700; }
    .rd-aluno-status.p { color: #16a34a; }
    .rd-aluno-status.a { color: #dc2626; }

    /* ── Badges ── */
    .badge-aberta    { background: #dcfce7; color: #14532d; border: 1px solid #86efac; border-radius: 6px; padding: 3px 9px; font-size: .65rem; font-weight: 700; white-space: nowrap; }
    .badge-encerrada { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: .65rem; font-weight: 700; }
    .badge-presente  { background: #dcfce7; color: #14532d; border: 1px solid #86efac; border-radius: 6px; padding: 3px 8px; font-size: .68rem; font-weight: 700; }
    .badge-ausente   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 6px; padding: 3px 8px; font-size: .68rem; font-weight: 700; }

    /* ── Sem chamada ── */
    .rd-sem-head {
      display: flex; align-items: center; gap: 10px; margin: 28px 0 12px;
    }
    .rd-section-title {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .14em; color: var(--text-3);
      display: flex; align-items: center; gap: 7px; flex: 1;
    }
    .rd-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .rd-sem-count {
      font-size: .65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      background: #fef3c7; border: 1px solid #fde68a; color: #92400e; white-space: nowrap;
    }

    .rd-sem-chamada { display: flex; flex-direction: column; gap: 10px; }

    .rd-turma-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--surface); border: 1px solid #fde68a;
      border-left: 4px solid #f59e0b;
      border-radius: 12px;
      transition: box-shadow .15s, transform .15s;
      animation: rdUp .28s cubic-bezier(.22,1,.36,1) both;
    }
    .rd-turma-row:hover { box-shadow: 0 4px 16px rgba(245,158,11,.1); transform: translateX(2px); }

    .rd-turma-initial {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: #fffbeb; color: #d97706; border: 1px solid #fde68a;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; font-weight: 800; font-size: 1rem;
    }
    .rd-turma-info { flex: 1; min-width: 0; }
    .rd-turma-nome { font-weight: 700; font-size: .9rem; color: var(--text); }
    .rd-turma-prof { font-size: .73rem; color: var(--text-3); margin-top: 2px; }

    .rd-turma-dot  { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; flex-shrink: 0; }
    .rd-turma-meta {
      font-size: .71rem; color: #92400e; font-weight: 600;
      background: #fef9c3; border: 1px solid #fde68a;
      padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .rd-turma-inst {
      font-size: .7rem; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 6px; flex-shrink: 0;
    }

    /* ── Empty ── */
    .rd-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 20px; color: var(--text-3); gap: 10px; text-align: center;
      background: var(--surface); border: 1px dashed var(--border-2); border-radius: 14px;
    }
    .rd-empty svg { opacity: .2; color: var(--acc); }
    .rd-empty p { font-size: .875rem; font-weight: 500; color: var(--text-2); }

    @keyframes rdUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    @media (max-width: 640px) {
      .rd-stats { grid-template-columns: 1fr 1fr; }
      .rd-stat.blue { grid-column: 1 / -1; }
    }
  </style>
</head>

<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  localStorage.removeItem('qr_role');
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,scrollY);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
