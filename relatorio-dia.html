<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Histórico de Chamadas — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/relatorio.css" />
  <style>
    #page-root { padding: 22px 18px !important; }
    @media (min-width: 769px) { #page-root { padding: 32px 36px !important; } }

    /* ── Header ── */
    .hist-header {
      margin-bottom: 18px; display: flex; align-items: center; gap: 12px;
    }
    .hist-header-icon {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      background: var(--acc-sub); color: var(--acc);
      display: flex; align-items: center; justify-content: center;
    }
    .hist-eyebrow { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--acc); margin-bottom: 3px; }
    .hist-title { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -.03em; line-height: 1.1; }
    .hist-sub { font-size: .8rem; color: var(--text-3); margin-top: 3px; }

    /* ── Stats bar ── */
    .hist-stats-bar {
      display: flex; align-items: stretch; gap: 10px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .hist-stat-pill {
      display: flex; align-items: center; gap: 11px; flex: 1; min-width: 160px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 16px;
    }
    .hist-stat-icon {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-3); color: var(--text-3);
    }
    .hist-stat-icon.blue   { background: var(--acc-sub); color: var(--acc); }
    .hist-stat-icon.green  { background: #dcfce7; color: #16a34a; }
    .hist-stat-icon.orange { background: #ffedd5; color: #ea580c; }
    .hist-stat-icon.red    { background: #fee2e2; color: #dc2626; }
    .hist-stat-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .hist-stat-num {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 1.35rem; font-weight: 800; color: var(--text); letter-spacing: -.03em; line-height: 1;
    }
    .hist-stat-num.green  { color: #16a34a; }
    .hist-stat-num.orange { color: #ea580c; }
    .hist-stat-num.red    { color: #dc2626; }
    .hist-stat-lbl { font-size: .68rem; color: var(--text-3); font-weight: 600; white-space: nowrap; }
    .hist-stat-sep { display: none; }


    /* ── Grupos por data ── */
    .hist-group { margin-bottom: 20px; animation: histUp .3s cubic-bezier(.22,1,.36,1) both; }
    .hist-date-sep {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; padding: 0 2px;
    }
    .hist-date-label {
      font-size: .72rem; font-weight: 700; color: var(--text-2);
      text-transform: capitalize; display: flex; align-items: center; gap: 7px;
    }
    .hist-hoje-badge {
      font-size: .6rem; font-weight: 700; padding: 2px 7px; border-radius: 20px;
      background: var(--acc); color: white; text-transform: uppercase; letter-spacing: .06em;
    }
    .hist-date-meta { font-size: .68rem; color: var(--text-3); font-weight: 500; }

    /* ── Linhas de chamada ── */
    .hist-day-rows { display: flex; flex-direction: column; gap: 6px; }
    .hist-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      animation: histUp .28s cubic-bezier(.22,1,.36,1) both;
      transition: border-color .13s, box-shadow .13s;
    }
    .hist-row:hover { border-color: var(--border-2); }
    .hist-row.open  { border-color: var(--border-acc); box-shadow: 0 0 0 2px var(--acc-sub); }

    .hist-row-main {
      display: flex; align-items: center; gap: 13px;
      padding: 13px 16px; cursor: pointer; user-select: none;
      transition: background .11s;
    }
    .hist-row-main:hover { background: var(--surface-2); }

    .hist-row-avatar {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: #eff6ff; color: var(--acc);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; font-weight: 800; font-size: 1rem;
    }
    .hist-row-info { flex: 1; min-width: 0; }
    .hist-row-turma  { font-weight: 700; font-size: .88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-row-materia { font-size: .7rem; color: var(--text-3); margin-top: 1px; }

    .hist-row-chips { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .hist-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .68rem; font-weight: 700; padding: 3px 8px;
      border-radius: 6px;
    }
    .hist-chip.green  { background: #dcfce7; color: #14532d; }
    .hist-chip.red    { background: #fee2e2; color: #991b1b; }

    .hist-row-freq {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: .88rem; font-weight: 800; flex-shrink: 0; min-width: 42px; text-align: right;
    }
    .hist-row-freq.green  { color: #16a34a; }
    .hist-row-freq.orange { color: #ea580c; }
    .hist-row-freq.red    { color: #dc2626; }

    .hist-row-status { flex-shrink: 0; }
    .hist-badge { font-size: .62rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .hist-badge.aberta    { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .hist-badge.encerrada { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border); }

    .hist-row-chevron { color: var(--text-3); flex-shrink: 0; transition: transform .22s; }
    .hist-row.open .hist-row-chevron { transform: rotate(90deg); }

    /* ── Detalhe expandido: 2 colunas ── */
    .hist-row-detail { display: none; border-top: 1px solid var(--border); background: var(--surface-2); }
    .hist-row.open .hist-row-detail { display: block; }
    .hist-detail-loading { padding: 16px 18px; font-size: .8rem; color: var(--text-3); }
    .hist-detail-empty   { padding: 16px 18px; font-size: .8rem; color: var(--text-3); text-align: center; }

    .hist-detail-inner {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .hist-detail-col { padding: 12px 16px; }
    .hist-detail-col:first-child { border-right: 1px solid var(--border); }
    .hist-detail-col-head {
      font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      margin-bottom: 8px; display: flex; align-items: center; gap: 5px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .hist-detail-col-head.green { color: #16a34a; }
    .hist-detail-col-head.red   { color: #dc2626; }
    .hist-detail-none { font-size: .78rem; color: var(--text-3); padding: 8px 0; }

    .hist-detail-aluno {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .8rem;
      animation: histUp .2s cubic-bezier(.22,1,.36,1) both;
    }
    .hist-detail-aluno:last-child { border-bottom: none; }
    .hist-detail-num  { font-size: .64rem; color: var(--text-3); font-weight: 600; width: 18px; text-align: right; flex-shrink: 0; }
    .hist-detail-nome { flex: 1; font-weight: 500; color: var(--text); }
    .hist-detail-mat  { font-size: .66rem; color: var(--text-3); flex-shrink: 0; }

    /* ── Empty ── */
    .hist-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 20px; color: var(--text-3); gap: 10px; text-align: center;
      background: var(--surface); border: 1px dashed var(--border-2); border-radius: 14px;
    }
    .hist-empty p { font-size: .875rem; font-weight: 500; color: var(--text-2); }

    /* ── Chips laranja (atrasados) ── */
    .hist-chip.orange { background: #fff7ed; color: #c2410c; }

    /* ── Tabs ── */
    .rel-tabs {
      display: flex; gap: 4px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px; margin-bottom: 16px;
      width: fit-content;
    }
    .rel-tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border: none; border-radius: 9px;
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: .8rem; font-weight: 600; color: var(--text-3);
      background: transparent; cursor: pointer;
      transition: all .15s;
    }
    .rel-tab:hover { color: var(--text); background: var(--surface); }
    .rel-tab.active {
      background: var(--surface); color: var(--text);
      box-shadow: 0 1px 4px rgba(13,21,38,.08), 0 0 0 1px var(--border);
    }
    .rel-tab svg { opacity: .6; }
    .rel-tab.active svg { opacity: 1; color: var(--acc); }

    /* ── Filter bar ── */
    .rel-filter-bar {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
    }
    .rel-filter-left { display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; flex: 1; }
    .rel-filter-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .rel-filter-group { display: flex; flex-direction: column; gap: 4px; }
    .rel-filter-label { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--text-3); }
    .rel-select, .rel-input {
      padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-size: .82rem; color: var(--text); background: var(--surface-2);
      font-family: inherit; outline: none; height: 36px;
      transition: border-color .13s, box-shadow .13s;
    }
    .rel-select { min-width: 160px; }
    .rel-input  { min-width: 120px; }

    /* ── Dropdown custom (mesmo padrão usado em horários/calendário) ── */
    .cdd { position: relative; min-width: 160px; }
    .cdd-trigger {
      width: 100%; height: 36px; display: flex; align-items: center; gap: 8px;
      padding: 0 11px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface-2); color: var(--text); cursor: pointer;
      font-family: inherit; font-size: .82rem; font-weight: 500;
      transition: border-color .13s, box-shadow .13s, background .13s;
    }
    .cdd-trigger:hover { border-color: var(--border-2); }
    .cdd.open .cdd-trigger { border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc-sub); background: var(--surface); }
    .cdd-val { flex: 1; min-width: 0; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cdd-chev { color: var(--text-3); flex-shrink: 0; transition: transform .2s cubic-bezier(.22,1,.36,1); }
    .cdd.open .cdd-chev { transform: rotate(180deg); }
    .cdd-panel {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 50;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 16px 40px -12px rgba(15,23,42,.3); padding: 5px; max-height: 260px; overflow-y: auto;
      opacity: 0; transform: translateY(-4px); pointer-events: none; transition: opacity .15s, transform .15s;
    }
    .cdd.open .cdd-panel { opacity: 1; transform: none; pointer-events: auto; }
    .cdd-opt {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 9px 11px; border: none; background: none; border-radius: 8px;
      font-family: inherit; font-size: .82rem; font-weight: 600; color: var(--text-2);
      cursor: pointer; text-align: left;
    }
    .cdd-opt-txt { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cdd-opt:hover { background: var(--surface-2); color: var(--text); }
    .cdd-opt.on { background: var(--acc-sub); color: var(--acc); }
    .cdd-check { flex-shrink: 0; opacity: 0; color: var(--acc); transition: opacity .12s; }
    .cdd-opt.on .cdd-check { opacity: 1; }

    .rel-select:focus, .rel-input:focus {
      border-color: var(--acc); background: var(--surface);
      box-shadow: 0 0 0 3px var(--acc-sub);
    }
    .rel-btn-clear {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0 12px; height: 36px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; font-size: .75rem; font-weight: 600;
      color: var(--text-3); cursor: pointer; font-family: inherit;
      transition: all .13s; white-space: nowrap;
    }
    .rel-btn-clear:hover { background: var(--red-sub); color: var(--red); border-color: #fca5a5; }

    .rel-btn-download {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0 18px; height: 36px;
      background: var(--acc); color: white; border: none;
      border-radius: 9px; font-size: .82rem; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      box-shadow: 0 2px 8px var(--acc-glow);
      transition: background .13s, transform .12s, box-shadow .13s;
      flex-shrink: 0;
    }
    .rel-btn-download:hover { background: var(--acc-2); transform: translateY(-1px); box-shadow: 0 4px 14px var(--acc-glow); }

    /* ── Tab: Por Aluno ── */
    .rel-aluno-grid { display: flex; flex-direction: column; gap: 8px; }
    .rel-aluno-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 13px; overflow: hidden;
      animation: histUp .28s cubic-bezier(.22,1,.36,1) both;
      transition: border-color .13s;
    }
    .rel-aluno-card:hover { border-color: var(--border-2); }
    .rel-aluno-card.open  { border-color: var(--border-acc); box-shadow: 0 0 0 2px var(--acc-sub); }

    .rel-aluno-card-head {
      display: flex; align-items: center; gap: 13px;
      padding: 13px 16px; cursor: pointer; user-select: none;
      transition: background .11s;
    }
    .rel-aluno-card-head:hover { background: var(--surface-2); }

    .rel-aluno-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: #eff6ff; color: var(--acc); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; font-weight: 800; font-size: .85rem;
    }
    .rel-aluno-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rel-aluno-info { flex: 1; min-width: 0; }
    .rel-aluno-nome { font-weight: 700; font-size: .875rem; color: var(--text); }
    .rel-aluno-meta { font-size: .7rem; color: var(--text-3); margin-top: 1px; }
    .rel-aluno-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .rel-aluno-freq  { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.1rem; font-weight: 800; }
    .rel-aluno-freq.green  { color: #16a34a; }
    .rel-aluno-freq.orange { color: #ea580c; }
    .rel-aluno-freq.red    { color: #dc2626; }
    .rel-aluno-chips { display: flex; gap: 4px; }

    .rel-aluno-detail { display: none; border-top: 1px solid var(--border); background: var(--surface-2); }
    .rel-aluno-card.open .rel-aluno-detail { display: block; }
    .rel-aluno-card.open .hist-row-chevron { transform: rotate(90deg); }

    .rel-aluno-freq-bar-wrap {
      height: 3px; background: var(--surface-4); margin: 0;
    }
    .rel-aluno-freq-bar {
      height: 100%; border-radius: 0;
      transition: width .4s ease;
    }

    .rel-aluno-table {
      width: 100%; border-collapse: collapse;
      font-size: .8rem; color: var(--text);
    }
    .rel-aluno-table th {
      padding: 9px 14px; text-align: left;
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-3);
      border-bottom: 1px solid var(--border); background: var(--surface-2);
    }
    .rel-aluno-table td {
      padding: 9px 14px; border-bottom: 1px solid var(--border);
    }
    .rel-aluno-table tr:last-child td { border-bottom: none; }
    .rel-aluno-table tr:hover td { background: var(--surface); }

    /* Versão compacta — usada nos modais (mais colunas, menos espaço) */
    .rel-aluno-table.compact { font-size: .74rem; }
    .rel-aluno-table.compact th,
    .rel-aluno-table.compact td { padding: 7px 9px; white-space: nowrap; }

    .rel-st-pres  { font-size: .62rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: #dcfce7; color: #14532d; }
    .rel-st-atraso { font-size: .62rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: #fff7ed; color: #c2410c; }
    .rel-st-aus   { font-size: .62rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: #fee2e2; color: #991b1b; }

    /* ── Tab: Resumo ── */
    .rel-resumo-header {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
      gap: 8px; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 14px; margin-bottom: 16px;
    }
    .rel-resumo-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 0; }
    .rel-resumo-num {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -.04em;
    }
    .rel-resumo-num.green  { color: #16a34a; }
    .rel-resumo-num.orange { color: #ea580c; }
    .rel-resumo-num.red    { color: #dc2626; }
    .rel-resumo-lbl {
      font-size: .6rem; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
      text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }

    .rel-resumo-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .rel-resumo-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 18px 14px;
      animation: histUp .3s cubic-bezier(.22,1,.36,1) both;
      transition: box-shadow .18s, transform .18s;
    }
    .rel-resumo-card:hover { box-shadow: 0 4px 16px rgba(13,21,38,.08); transform: translateY(-2px); }
    .rel-resumo-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .rel-resumo-bar-wrap { height: 4px; background: var(--surface-4); border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
    .rel-resumo-bar { height: 100%; border-radius: 99px; transition: width .5s ease; }
    .rel-resumo-card-meta {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      font-size: .72rem; color: var(--text-3); font-weight: 500;
    }

    @keyframes histUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── Mobile ≤640px ── */
    @media (max-width: 640px) {
      #page-root { padding-bottom: calc(22px + env(safe-area-inset-bottom, 0px)) !important; }

      /* Tabs — linha inteira, bem visível */
      .rel-tabs { width: 100%; }
      .rel-tab { flex: 1; justify-content: center; padding: 9px 6px; font-size: .8rem; min-height: 40px; }
      .rel-tab svg { display: none; }

      /* Filtros — Turma/De/Até numa linha; Buscar aluno ponta a ponta; Limpar+Baixar lado a lado */
      .rel-filter-bar { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; }
      .rel-filter-left {
        display: grid; grid-template-columns: repeat(3, 1fr);
        gap: 6px; width: 100%;
      }
      .rel-filter-group { flex-direction: column; align-items: stretch; gap: 3px; width: 100%; min-width: 0; }
      #fg-aluno, #fg-prof { grid-column: 1 / -1; }
      .rel-filter-label { min-width: unset; font-size: .56rem; }
      .rel-select, .rel-input {
        width: 100%; min-width: 0; height: 40px; font-size: .76rem; padding: 6px 7px;
      }
      .cdd { width: 100%; min-width: 0; }
      .cdd-trigger { height: 40px; font-size: .76rem; padding: 0 7px; gap: 4px; }
      .rel-filter-actions { width: 100%; gap: 8px; }
      .rel-btn-clear { flex: 1; justify-content: center; height: 42px; }
      .rel-btn-download { flex: 1; justify-content: center; height: 42px; font-size: .82rem; padding: 0 10px; }

      /* Stats */
      .hist-stat-sep { display: none; }
      .hist-stats-bar { flex-wrap: nowrap; gap: 6px; }
      .hist-stat-pill { flex: 1; min-width: 0; padding: 9px 7px; gap: 6px; }
      .hist-stat-icon { width: 26px; height: 26px; border-radius: 8px; }
      .hist-stat-icon svg { width: 12px; height: 12px; }
      .hist-stat-text { min-width: 0; }
      .hist-stat-num { font-size: 1rem; }
      .hist-stat-lbl { white-space: normal; font-size: .54rem; line-height: 1.15; }

      /* Detail grid */
      .hist-detail-inner { grid-template-columns: 1fr; }
      .hist-detail-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      .hist-row-chips { flex-wrap: wrap; gap: 3px; }

<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,scrollY);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
