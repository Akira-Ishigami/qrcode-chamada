<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/relatorio.css" />
  <style>
    #page-root { padding: 22px 18px !important; }
    @media (min-width: 769px) { #page-root { padding: 32px 36px !important; } }

    /* ── Header ── */
    .hist-header { margin-bottom: 20px; }
    .hist-eyebrow { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--acc); margin-bottom: 5px; }
    .hist-title { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.65rem; font-weight: 800; color: var(--text); letter-spacing: -.03em; line-height: 1.1; }
    .hist-sub { font-size: .82rem; color: var(--text-3); margin-top: 4px; }

    /* ── Stats bar ── */
    .hist-stats-bar {
      display: flex; align-items: center; gap: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px; margin-bottom: 20px;
      flex-wrap: wrap; gap: 10px;
    }
    .hist-stat-pill { display: flex; align-items: baseline; gap: 5px; }
    .hist-stat-num {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: -.03em;
    }
    .hist-stat-num.green  { color: #16a34a; }
    .hist-stat-num.orange { color: #ea580c; }
    .hist-stat-num.red    { color: #dc2626; }
    .hist-stat-lbl { font-size: .72rem; color: var(--text-3); font-weight: 600; }
    .hist-stat-sep { width: 1px; height: 22px; background: var(--border); margin: 0 16px; flex-shrink: 0; }

    /* ── Filtros ── */
    .hist-filters {
      display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .hist-filter-group { display: flex; flex-direction: column; gap: 5px; }
    .hist-filter-label { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); }
    .hist-select, .hist-input {
      padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-size: .82rem; color: var(--text); background: var(--surface);
      font-family: inherit; outline: none; transition: border-color .13s;
      height: 34px;
    }
    .hist-select { min-width: 160px; }
    .hist-input  { width: 130px; }
    .hist-select:focus, .hist-input:focus { border-color: var(--acc); }
    .hist-btn-clear {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; font-size: .75rem; font-weight: 600; color: var(--text-3);
      cursor: pointer; font-family: inherit; height: 34px;
      transition: all .13s; align-self: flex-end;
    }
    .hist-btn-clear:hover { background: var(--red-sub); color: var(--red); border-color: #fca5a5; }

    /* ── Grupos por data ── */
    .hist-group { margin-bottom: 20px; animation: histUp .3s cubic-bezier(.22,1,.36,1) both; }
    .hist-date-sep {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; padding: 0 2px;
    }
    .hist-date-label {
      font-size: .72rem; font-weight: 700; color: var(--text-2);
      text-transform: capitalize; display: flex; align-items: center; gap: 7px;
    }
    .hist-hoje-badge {
      font-size: .6rem; font-weight: 700; padding: 2px 7px; border-radius: 20px;
      background: var(--acc); color: white; text-transform: uppercase; letter-spacing: .06em;
    }
    .hist-date-meta { font-size: .68rem; color: var(--text-3); font-weight: 500; }

    /* ── Linhas de chamada ── */
    .hist-day-rows { display: flex; flex-direction: column; gap: 6px; }
    .hist-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      animation: histUp .28s cubic-bezier(.22,1,.36,1) both;
      transition: border-color .13s, box-shadow .13s;
    }
    .hist-row:hover { border-color: var(--border-2); }
    .hist-row.open  { border-color: var(--border-acc); box-shadow: 0 0 0 2px var(--acc-sub); }

    .hist-row-main {
      display: flex; align-items: center; gap: 13px;
      padding: 13px 16px; cursor: pointer; user-select: none;
      transition: background .11s;
    }
    .hist-row-main:hover { background: var(--surface-2); }

    .hist-row-avatar {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: #eff6ff; color: var(--acc);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; font-weight: 800; font-size: 1rem;
    }
    .hist-row-info { flex: 1; min-width: 0; }
    .hist-row-turma  { font-weight: 700; font-size: .88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-row-materia { font-size: .7rem; color: var(--text-3); margin-top: 1px; }

    .hist-row-chips { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .hist-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .68rem; font-weight: 700; padding: 3px 8px;
      border-radius: 6px;
    }
    .hist-chip.green  { background: #dcfce7; color: #14532d; }
    .hist-chip.red    { background: #fee2e2; color: #991b1b; }

    .hist-row-freq {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: .88rem; font-weight: 800; flex-shrink: 0; min-width: 42px; text-align: right;
    }
    .hist-row-freq.green  { color: #16a34a; }
    .hist-row-freq.orange { color: #ea580c; }
    .hist-row-freq.red    { color: #dc2626; }

    .hist-row-status { flex-shrink: 0; }
    .hist-badge { font-size: .62rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .hist-badge.aberta    { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .hist-badge.encerrada { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border); }

    .hist-row-chevron { color: var(--text-3); flex-shrink: 0; transition: transform .22s; }
    .hist-row.open .hist-row-chevron { transform: rotate(90deg); }

    /* ── Detalhe expandido: 2 colunas ── */
    .hist-row-detail { display: none; border-top: 1px solid var(--border); background: var(--surface-2); }
    .hist-row.open .hist-row-detail { display: block; }
    .hist-detail-loading { padding: 16px 18px; font-size: .8rem; color: var(--text-3); }
    .hist-detail-empty   { padding: 16px 18px; font-size: .8rem; color: var(--text-3); text-align: center; }

    .hist-detail-inner {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .hist-detail-col { padding: 12px 16px; }
    .hist-detail-col:first-child { border-right: 1px solid var(--border); }
    .hist-detail-col-head {
      font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      margin-bottom: 8px; display: flex; align-items: center; gap: 5px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .hist-detail-col-head.green { color: #16a34a; }
    .hist-detail-col-head.red   { color: #dc2626; }
    .hist-detail-none { font-size: .78rem; color: var(--text-3); padding: 8px 0; }

    .hist-detail-aluno {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .8rem;
      animation: histUp .2s cubic-bezier(.22,1,.36,1) both;
    }
    .hist-detail-aluno:last-child { border-bottom: none; }
    .hist-detail-num  { font-size: .64rem; color: var(--text-3); font-weight: 600; width: 18px; text-align: right; flex-shrink: 0; }
    .hist-detail-nome { flex: 1; font-weight: 500; color: var(--text); }
    .hist-detail-mat  { font-size: .66rem; color: var(--text-3); flex-shrink: 0; }

    /* ── Empty ── */
    .hist-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 20px; color: var(--text-3); gap: 10px; text-align: center;
      background: var(--surface); border: 1px dashed var(--border-2); border-radius: 14px;
    }
    .hist-empty p { font-size: .875rem; font-weight: 500; color: var(--text-2); }

    @keyframes histUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    @media (max-width: 640px) {
      .hist-filters { flex-direction: column; align-items: stretch; }
      .hist-select, .hist-input { width: 100%; }
      .hist-detail-inner { grid-template-columns: 1fr; }
      .hist-detail-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      .hist-stat-sep { display: none; }
    }
  </style>
</head>

<script type="module">
import { supabase } from '/src/supabase.js';
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  localStorage.removeItem('qr_role');
  window.location.href = '/login.html';
});
</script>
<script>
(function(){
  var btn=document.getElementById('hamburger-btn');
  var sidebar=document.querySelector('.sidebar');
  var overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var scrollY=0;
  function open(){scrollY=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+scrollY+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,scrollY);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
