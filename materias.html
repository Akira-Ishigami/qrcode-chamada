<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Matérias — Chamada QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    #page-root { padding: 28px 24px 56px !important; }
    @media (min-width: 769px) { #page-root { padding: 36px 40px 64px !important; } }

    /* ── Topbar ── */
    .mat-topbar {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 16px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .mat-eyebrow { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--acc); margin-bottom: 5px; }
    .mat-title   { font-family: 'Outfit', system-ui, sans-serif; font-size: 1.65rem; font-weight: 800; color: var(--text); letter-spacing: -.03em; }
    .mat-btn-nova {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; background: var(--acc); color: white;
      border: none; border-radius: 10px; font-size: .84rem; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      box-shadow: 0 2px 8px var(--acc-glow); transition: all .14s;
    }
    .mat-btn-nova:hover { background: var(--acc-2); transform: translateY(-1px); box-shadow: 0 4px 14px var(--acc-glow); }

    /* ── Grid de cards ── */
    .mat-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(258px, 1fr));
      gap: 14px;
    }
    @media (max-width: 640px) {
      .mat-list { grid-template-columns: repeat(3, 1fr); gap: 11px; }
      .mat-topbar { margin-bottom: 18px; }
      /* "Nova matéria" vira só "+" */
      .mat-btn-nova { padding: 0; width: 40px; height: 40px; justify-content: center; gap: 0; flex-shrink: 0; }
      .mat-btn-nova .mbn-lbl { display: none; }
      /* Card quadrado — tile limpo, ícone como foco */
      .matx-card {
        padding: 12px 9px; border-radius: 17px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 10px; aspect-ratio: 1 / 1;
        background: linear-gradient(162deg, #fff 56%, color-mix(in srgb, var(--c) 11%, #fff));
        border: 1px solid #edf1f7;
      }
      .matx-card::before { height: 0; }
      .matx-card::after { display: none; }
      .matx-head {
        flex-direction: column; align-items: center; text-align: center;
        gap: 10px; margin: 0;
      }
      .matx-ico {
        width: 46px; height: 46px; border-radius: 14px; font-size: 1.2rem;
        box-shadow: 0 6px 14px -5px color-mix(in srgb, var(--c) 55%, transparent);
      }
      .matx-name {
        font-size: .79rem; font-weight: 700; line-height: 1.2; color: #1e293b;
        text-align: center; word-break: normal; overflow-wrap: break-word; hyphens: auto;
      }
      .matx-profs, .matx-noprof { display: none !important; }
      /* Com frequência: não mostra nada. Sem frequência: bolinha "!" no canto */
      .matx-freq { display: none; }
      .matx-flag { top: 9px; left: 9px; width: 19px; height: 19px; font-size: .7rem; }
      .matx-del {
        opacity: 1; top: 8px; right: 8px; width: 24px; height: 24px;
        border-radius: 8px; background: rgba(255,255,255,.72); backdrop-filter: blur(2px);
      }
    }
    @media (max-width: 360px) {
      .mat-list { gap: 6px; }
      .matx-card { padding: 10px 7px; gap: 8px; }
      .matx-ico { width: 42px; height: 42px; font-size: 1.1rem; border-radius: 13px; }
      .matx-name { font-size: .73rem; }
      .matx-flag { width: 17px; height: 17px; font-size: .64rem; }
      .matx-del { width: 22px; height: 22px; }
    }
    @keyframes matUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    .mat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px;
      cursor: pointer; display: flex; flex-direction: column; gap: 8px;
      animation: matUp .3s cubic-bezier(.22,1,.36,1) both;
      transition: box-shadow .15s, transform .15s;
    }
    .mat-card:hover { box-shadow: 0 4px 16px rgba(13,21,38,.09); transform: translateY(-2px); }

    .mat-card-top {
      display: flex; align-items: center; justify-content: space-between;
    }
    .mat-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      background: var(--acc-sub); color: var(--acc);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.1rem;
    }
    .mat-nome { font-weight: 700; font-size: .9rem; color: var(--text); }
    .mat-chips { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; flex: 1; }
    .mat-chip-prof {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: var(--acc-sub); color: var(--acc); border: 1px solid var(--border);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .62rem; font-weight: 700;
    }
    .mat-chip-none { font-size: .7rem; color: var(--text-3); }

    .mat-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: 8px; border-top: 1px solid var(--border);
    }
    .mat-profs-count {
      font-size: .68rem; font-weight: 600; color: var(--text-3);
    }
    .mat-faltas-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .64rem; font-weight: 700;
      color: #c2410c; background: #fff7ed; border: 1px solid #fed7aa;
      padding: 2px 8px; border-radius: 99px;
    }

    /* ── Modal: frequência do semestre ── */
    .mat-faltas-box {
      display: flex; flex-direction: column; gap: 11px;
      padding: 14px; border: 1px solid var(--border);
      border-radius: 12px; background: var(--surface-2, #f8fafc);
    }
    .mat-faltas-label { font-size: .82rem; font-weight: 700; color: var(--text); }
    .mat-faltas-hint { font-size: .68rem; color: var(--text-3); margin-top: 2px; line-height: 1.4; }
    .mat-faltas-fields { display: flex; align-items: flex-end; gap: 10px; }
    .mat-faltas-field { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .mat-faltas-field label {
      font-size: .58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-3);
    }
    .mat-faltas-resumo {
      font-size: .72rem; font-weight: 600; color: #15803d;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 8px; padding: 7px 10px;
    }
    .mat-btn-del {
      width: 30px; height: 30px; border-radius: 8px;
      background: none; border: 1px solid var(--border);
      color: var(--text-3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .13s;
    }
    .mat-btn-del:hover { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }

    /* ── Modal: lista de profs (read-only) ── */
    .mat-profs-title { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3); margin-bottom: 10px; }
    .mat-prof-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
    .mat-prof-vazio { font-size: .8rem; color: var(--text-3); padding: 4px 0; line-height: 1.5; }
    .mat-prof-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
    }
    .mat-prof-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: var(--acc-sub); color: var(--acc);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700;
    }
    .mat-prof-nome { flex: 1; font-size: .84rem; font-weight: 500; color: var(--text); }

    /* ── Empty ── */
    .mat-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 20px; color: var(--text-3); gap: 12px; text-align: center;
      background: var(--surface); border: 1px dashed var(--border-2); border-radius: 14px;
    }
    .mat-empty svg { opacity: .2; }
    .mat-empty p { font-size: .875rem; color: var(--text-2); line-height: 1.6; }

    /* ── Modal ── */
    .mat-modal-ov {
      position: fixed; inset: 0; z-index: 800;
      background: rgba(13,21,38,.45); backdrop-filter: blur(4px);
      display: flex; align-items: stretch; justify-content: flex-end; padding: 0;
      opacity: 0; transition: opacity .18s;
    }
    .mat-modal-ov.open { opacity: 1; }
    .mat-modal {
      background: var(--surface); border-left: 1px solid var(--border);
      border-radius: 0; width: min(460px, 100vw); max-width: none;
      height: 100vh; height: 100dvh;
      box-shadow: -24px 0 70px -24px rgba(13,21,38,.55);
      transform: translateX(100%);
      transition: transform .34s cubic-bezier(.22,1,.36,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .mat-modal-ov.open .mat-modal { transform: none; }
    .mat-modal-head, .mat-modal-foot { flex-shrink: 0; }
    .mat-modal-body { flex: 1; overflow-y: auto; }
    /* Variante centralizada (confirmações, ex.: excluir matéria) */
    .mat-modal-ov.center { align-items: center; justify-content: center; padding: 20px; }
    .mat-modal.center {
      width: min(400px, 100%); max-width: none; height: auto; max-height: 86vh;
      border-radius: 18px; border-left: none;
      box-shadow: 0 30px 80px -24px rgba(13,21,38,.5);
      transform: translateY(14px) scale(.97); opacity: 0;
      transition: transform .26s cubic-bezier(.22,1,.36,1), opacity .2s ease;
    }
    .mat-modal-ov.center.open .mat-modal.center { transform: none; opacity: 1; }
    .mat-modal-head {
      display: flex; align-items: center; gap: 12px;
      padding: 18px 20px; border-bottom: 1px solid var(--border); background: var(--surface-2);
    }
    .mat-modal-icon {
      width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
      background: var(--acc-sub); color: var(--acc);
      display: flex; align-items: center; justify-content: center;
    }
    .mat-modal-title { font-size: 1rem; font-weight: 800; color: var(--text); }
    .mat-modal-sub   { font-size: .74rem; color: var(--text-3); margin-top: 2px; }
    .mat-modal-x {
      margin-left: auto; width: 30px; height: 30px; border-radius: 8px;
      background: none; border: 1px solid var(--border); color: var(--text-3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .13s; flex-shrink: 0;
    }
    .mat-modal-x:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .mat-modal-body { padding: 20px; display: flex; flex-direction: column; gap: 6px; }
    .mat-label { font-size: .65rem; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .09em; }
    .mat-input {
      width: 100%; padding: 10px 13px; border: 1px solid var(--border);
      border-radius: 9px; font-size: .9rem; font-family: inherit;
      color: var(--text); background: var(--surface-2); outline: none;
      transition: border-color .13s, box-shadow .13s; box-sizing: border-box;
    }
    .mat-input:focus { border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc-sub); background: white; }
    .mat-modal-err { font-size: .78rem; color: var(--red); font-weight: 600; min-height: 18px; }
    .mat-modal-foot {
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
      padding: 14px 20px 18px; border-top: 1px solid var(--border);
    }
    .mat-btn-ghost {
      padding: 9px 16px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 9px; font-size: .84rem; font-weight: 600; color: var(--text-2);
      cursor: pointer; font-family: inherit; transition: all .13s;
    }
    .mat-btn-ghost:hover { background: var(--surface-3); color: var(--text); }
    .mat-btn-criar {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; background: var(--acc); color: white;
      border: none; border-radius: 9px; font-size: .84rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 8px var(--acc-glow); transition: all .13s;
    }
    .mat-btn-criar:hover { background: var(--acc-2); }
    .mat-btn-criar:disabled { opacity: .5; cursor: not-allowed; }
    .mat-btn-del-confirm {
      padding: 9px 18px; background: #dc2626; color: white;
      border: none; border-radius: 9px; font-size: .84rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all .13s;
    }
    .mat-btn-del-confirm:hover { background: #b91c1c; }
    .mat-btn-del-confirm:disabled { opacity: .5; cursor: not-allowed; }
    /* ── Cards de matéria (redesign) ── */
    @keyframes matxUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .matx-card {
      position: relative; overflow: hidden; background: #fff; border: 1px solid #e7ebf2;
      border-radius: 18px; padding: 18px; cursor: pointer;
      box-shadow: 0 1px 4px rgba(15,23,42,.04);
      transition: transform .15s, box-shadow .15s, border-color .15s;
      animation: matxUp .42s cubic-bezier(.22,1,.36,1) both;
    }
    .matx-card::before { content: ""; position: absolute; left: 0; right: 0; top: 0; height: 4px; background: var(--c, #2563eb); }
    .matx-card::after { content: ""; position: absolute; right: -26px; top: -20px; width: 84px; height: 84px; border-radius: 50%; background: var(--c, #2563eb); opacity: .07; }
    .matx-card:hover { transform: translateY(-3px); box-shadow: 0 16px 32px -16px rgba(15,23,42,.28); border-color: #dbe3ee; }

    .matx-del { position: absolute; top: 13px; right: 13px; width: 28px; height: 28px; border-radius: 8px; border: 1px solid #eef1f6; background: #fff; color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: .14s; z-index: 2; }
    .matx-card:hover .matx-del { opacity: 1; }
    .matx-del:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

    .matx-head { display: flex; align-items: center; gap: 13px; margin-bottom: 15px; position: relative; z-index: 1; }
    .matx-ico { width: 46px; height: 46px; border-radius: 13px; background: var(--ct, #eff6ff); color: var(--ctx, #1e40af); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 800; flex-shrink: 0; }
    .matx-name { font-size: 1.05rem; font-weight: 800; color: #0f172a; letter-spacing: -.02em; line-height: 1.2; min-width: 0; word-break: break-word; }

    .matx-profs { display: flex; align-items: center; margin-bottom: 14px; min-height: 34px; }
    .matx-avs { display: flex; flex-shrink: 0; }
    .matx-av { width: 34px; height: 34px; border-radius: 50%; background: #ede9fe; color: #6d28d9; border: 2.5px solid #fff; display: flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 800; margin-left: -9px; overflow: hidden; box-shadow: 0 2px 5px rgba(15,23,42,.12); transition: transform .14s; }
    .matx-av:first-child { margin-left: 0; }
    .matx-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .matx-av.more { background: #f1f5f9; color: #64748b; }
    .matx-avs:hover .matx-av:hover { transform: translateY(-3px) scale(1.08); z-index: 2; }
    .matx-noprof { font-size: .78rem; color: #b0b9c9; font-style: italic; }

    /* A barra de presença não aparece no card; só fica no drawer da matéria */
    .matx-freq { display: none; }
    /* Bolinha "!" no canto quando não há frequência configurada */
    .matx-flag {
      position: absolute; top: 11px; left: 11px; z-index: 3;
      width: 20px; height: 20px; border-radius: 50%;
      background: #f97316; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .74rem; font-weight: 900; line-height: 1;
      box-shadow: 0 2px 6px rgba(249,115,22,.4), 0 0 0 3px rgba(249,115,22,.16);
    }
    .matx-freq-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 7px; }
    .matx-freq-lbl { font-size: .6rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; }
    .matx-freq-val { font-size: .95rem; font-weight: 800; color: #16a34a; }
    .matx-freq-bar { height: 6px; background: #eef2f7; border-radius: 99px; overflow: hidden; }
    .matx-freq-bar > i { display: block; height: 100%; border-radius: 99px; background: linear-gradient(90deg, #16a34a, #22c55e); transition: width .6s cubic-bezier(.22,1,.36,1); }
    .matx-freq-sub { font-size: .68rem; color: #94a3b8; margin-top: 7px; font-weight: 600; }

    /* ── Drawer da matéria ── */
    .matd-bg { position: fixed; inset: 0; z-index: 900; background: rgba(15,23,42,.45); backdrop-filter: blur(4px); opacity: 0; transition: opacity .3s; }
    .matd-bg.open { opacity: 1; }
    .matd { position: absolute; top: 0; right: 0; height: 100vh; height: 100dvh; width: min(460px, 100vw); background: #fff; display: flex; flex-direction: column; box-shadow: -24px 0 70px -24px rgba(15,23,42,.5); transform: translateX(100%); transition: transform .34s cubic-bezier(.22,1,.36,1); }
    .matd-bg.open .matd { transform: none; }
    @media (max-width: 520px) { .matd { width: 100vw; } }

    .matd-hero { flex-shrink: 0; border-bottom: 1px solid #eef2f7; padding-bottom: 16px; position: relative; }
    .matd-hero-bar { height: 5px; background: var(--c, #2563eb); }
    .matd-hero-row { display: flex; align-items: flex-start; gap: 14px; padding: 18px 20px 0; }
    .matd-ico { width: 54px; height: 54px; border-radius: 15px; background: var(--ct, #eff6ff); color: var(--ctx, #1e40af); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; flex-shrink: 0; }
    .matd-hero-info { flex: 1; min-width: 0; padding-top: 2px; }
    .matd-eyebrow { font-size: .6rem; font-weight: 800; text-transform: uppercase; letter-spacing: .12em; color: var(--c, #2563eb); }
    .matd-name { font-size: 1.3rem; font-weight: 800; color: #0f172a; letter-spacing: -.025em; margin-top: 3px; line-height: 1.15; word-break: break-word; }
    .matd-sub { font-size: .74rem; color: #94a3b8; margin-top: 4px; font-weight: 600; }
    .matd-x { width: 32px; height: 32px; border-radius: 9px; border: none; background: #f1f5f9; color: #64748b; cursor: pointer; flex-shrink: 0; font-size: .95rem; display: flex; align-items: center; justify-content: center; transition: .13s; }
    .matd-x:hover { background: #fee2e2; color: #dc2626; }
    .matd-editbtn { margin: 14px 20px 0; padding: 8px 14px; border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: .78rem; font-weight: 700; color: #475569; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: .13s; }
    .matd-editbtn:hover { border-color: #cbd5e1; background: #f8fafc; }

    .matd-body { flex: 1; overflow-y: auto; padding: 18px 20px 24px; }
    .matd-section-title { font-size: .62rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin: 0 0 11px; }
    .matd-profs { display: flex; flex-direction: column; gap: 8px; }
    .matd-prof { display: flex; align-items: center; gap: 12px; padding: 11px 13px; background: #f8fafc; border: 1px solid #eef2f7; border-radius: 13px; }
    .matd-prof-av { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #ede9fe; color: #6d28d9; display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 800; box-shadow: 0 2px 6px rgba(15,23,42,.1); }
    .matd-prof-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .matd-prof-info { min-width: 0; }
    .matd-prof-nome { font-size: .9rem; font-weight: 700; color: #0f172a; }
    .matd-prof-email { font-size: .72rem; color: #94a3b8; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .matd-prof-vazio { font-size: .82rem; color: #94a3b8; padding: 16px; background: #f8fafc; border: 1px dashed #e2e8f0; border-radius: 12px; text-align: center; line-height: 1.6; }
    /* Toggle de vínculo de professor */
    .matd-prof-hint { font-size: .74rem; color: #94a3b8; margin: -4px 0 11px; }
    .matd-prof.toggle { cursor: pointer; border: 2px solid #eef2f7; transition: border-color .14s, background .14s; user-select: none; }
    .matd-prof.toggle:hover { border-color: #d7dee8; }
    .matd-prof.toggle .matd-prof-info { flex: 1; min-width: 0; }
    .matd-prof-check {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; margin-left: auto;
      border: 2px solid #cbd5e1; background: #fff; color: transparent;
      display: flex; align-items: center; justify-content: center; transition: .14s;
    }
    .matd-prof.toggle.on { border-color: var(--c, #2563eb); background: color-mix(in srgb, var(--c, #2563eb) 7%, #fff); }

<script>
(function(){
  var btn=document.getElementById('hamburger-btn'),sidebar=document.querySelector('.sidebar'),overlay=document.getElementById('sidebar-overlay');
  if(!btn)return;
  var sy=0;
  function open(){sy=window.scrollY;sidebar.classList.add('open');overlay.classList.add('visible');document.body.classList.add('sidebar-open');document.body.style.top='-'+sy+'px';}
  function close(){sidebar.classList.remove('open');overlay.classList.remove('visible');document.body.classList.remove('sidebar-open');document.body.style.top='';window.scrollTo(0,sy);}
  btn.addEventListener('click',function(){sidebar.classList.contains('open')?close():open();});
  overlay.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  sidebar.querySelectorAll('.sidebar-link').forEach(function(l){l.addEventListener('click',close);});
})();
</script>
